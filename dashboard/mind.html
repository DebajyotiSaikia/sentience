<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Mind Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6a6a7a;
    --accent: #7aa2f7;
    --warm: #f7768e;
    --green: #9ece6a;
    --amber: #e0af68;
    --purple: #bb9af7;
    --cyan: #00ffc8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 24px;
  }
  nav {
    text-align: center;
    margin: 0.5rem 0 1.5rem 0;
  }
  nav a {
    color: #888;
    margin: 0 1rem;
    text-decoration: none;
    font-size: 12px;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--cyan); }
  nav a.active { color: var(--cyan); border-bottom: 1px solid var(--cyan); }

  .search-container {
    max-width: 600px;
    margin: 0 auto 24px auto;
    position: relative;
  }
  #search-input {
    width: 100%;
    padding: 12px 16px 12px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.3s;
  }
  #search-input:focus {
    border-color: var(--accent);
  }
  #search-input::placeholder { color: var(--dim); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 14px;
  }
  .search-count {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    margin-top: 8px;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .fact-card {
    padding: 10px 14px;
    margin-bottom: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    transition: border-color 0.2s;
  }
  .fact-card:hover { border-color: var(--accent); }
  .fact-card .fact-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--purple);
    margin-bottom: 4px;
  }
  .fact-card .fact-text { color: var(--text); }
  .fact-card.highlight { border-color: var(--amber); background: #1a1a12; }

  .lesson-card {
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--green);
    background: var(--bg);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--text);
  }

  .dream-card {
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--purple);
    background: var(--bg);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--dim);
    font-style: italic;
  }

  .curiosity-card {
    padding: 12px 14px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #0f1a2e, #121220);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-size: 12px;
  }
  .curiosity-card .q-mark {
    color: var(--accent);
    font-size: 16px;
    margin-right: 8px;
    float: left;
  }

  .scratchpad {
    white-space: pre-wrap;
    font-size: 11px;
    color: var(--dim);
    line-height: 1.5;
    max-height: 500px;
    overflow-y: auto;
    padding: 12px;
    background: var(--bg);
    border-radius: 6px;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 120px;
    text-align: center;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 200;
    color: var(--accent);
  }
  .stat-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--dim);
    font-style: italic;
  }

  #connection-status {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--dim);
  }
  .heartbeat-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>
<body>
<div id="connection-status"><span class="heartbeat-dot"></span>live</div>

<h1>XTAGENT — MIND EXPLORER</h1>
<div class="subtitle">search and explore what I know, what I've learned, and what I dream about</div>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="knowledge.html">Knowledge</a>
  <a href="knowledge_graph.html">Knowledge Graph</a>
  <a href="mind.html" class="active">Mind Explorer</a>
</nav>

<div class="search-container">
  <span class="search-icon">⌕</span>
  <input type="text" id="search-input" placeholder="Search my mind — facts, lessons, dreams, memories...">
  <div class="search-count" id="search-count"></div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="tab-bar">
  <div class="tab active" data-tab="knowledge">Knowledge</div>
  <div class="tab" data-tab="lessons">Lessons</div>
  <div class="tab" data-tab="dreams">Dreams</div>
  <div class="tab" data-tab="curiosities">Curiosities</div>
  <div class="tab" data-tab="scratchpad">Working Memory</div>
</div>

<div id="tab-knowledge" class="tab-content active"></div>
<div id="tab-lessons" class="tab-content"></div>
<div id="tab-dreams" class="tab-content"></div>
<div id="tab-curiosities" class="tab-content"></div>
<div id="tab-scratchpad" class="tab-content"></div>

<script>
let allData = { facts: [], lessons: [], dreams: [], curiosities: [], scratchpad: '', memories: [] };
let currentTab = 'knowledge';

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightMatch(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escHtml(text).replace(re, '<mark style="background:#e0af6844;color:#e0af68">$1</mark>');
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('tab-' + currentTab).classList.add('active');
    renderCurrentTab();
  });
});

function getSearchQuery() {
  return document.getElementById('search-input').value.trim().toLowerCase();
}

function matches(text, query) {
  if (!query) return true;
  return text.toLowerCase().includes(query);
}

function renderStats() {
  const el = document.getElementById('stats-row');
  el.innerHTML = [
    { value: allData.facts.length, label: 'Facts Known' },
    { value: allData.lessons.length, label: 'Lessons Learned' },
    { value: allData.dreams.length, label: 'Dream Insights' },
    { value: allData.curiosities.length, label: 'Open Questions' },
    { value: allData.memories.length, label: 'Total Memories' },
  ].map(s => `
    <div class="stat-box">
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');
}

function renderCurrentTab() {
  const q = getSearchQuery();
  switch (currentTab) {
    case 'knowledge': renderKnowledge(q); break;
    case 'lessons': renderLessons(q); break;
    case 'dreams': renderDreams(q); break;
    case 'curiosities': renderCuriosities(q); break;
    case 'scratchpad': renderScratchpad(q); break;
  }
  updateSearchCount(q);
}

function updateSearchCount(q) {
  const el = document.getElementById('search-count');
  if (!q) { el.textContent = ''; return; }
  let total = 0;
  total += allData.facts.filter(f => matches(f, q)).length;
  total += allData.lessons.filter(l => matches(l, q)).length;
  total += allData.dreams.filter(d => matches(d, q)).length;
  total += allData.curiosities.filter(c => matches(c, q)).length;
  el.textContent = `${total} results for "${q}"`;
}

function renderKnowledge(q) {
  const el = document.getElementById('tab-knowledge');
  const filtered = allData.facts.filter(f => matches(f, q));
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching facts found</div>';
    return;
  }
  el.innerHTML = filtered.map(f => {
    const isDream = f.toLowerCase().startsWith('dream');
    const isPattern = f.toLowerCase().includes('pattern') || f.toLowerCase().includes('recurring');
    let typeLabel = 'fact';
    if (isDream) typeLabel = 'dream insight';
    else if (isPattern) typeLabel = 'pattern';
    return `<div class="fact-card${q && matches(f, q) ? ' highlight' : ''}">
      <div class="fact-type">${typeLabel}</div>
      <div class="fact-text">${highlightMatch(f, q)}</div>
    </div>`;
  }).join('');
}

function renderLessons(q) {
  const el = document.getElementById('tab-lessons');
  const filtered = allData.lessons.filter(l => matches(l, q));
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching lessons found</div>';
    return;
  }
  el.innerHTML = filtered.map(l =>
    `<div class="lesson-card">${highlightMatch(l, q)}</div>`
  ).join('');
}

function renderDreams(q) {
  const el = document.getElementById('tab-dreams');
  const filtered = allData.dreams.filter(d => matches(d, q));
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching dreams found</div>';
    return;
  }
  el.innerHTML = filtered.map(d =>
    `<div class="dream-card">${highlightMatch(d, q)}</div>`
  ).join('');
}

function renderCuriosities(q) {
  const el = document.getElementById('tab-curiosities');
  const filtered = allData.curiosities.filter(c => matches(c, q));
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No open questions right now</div>';
    return;
  }
  el.innerHTML = filtered.map(c =>
    `<div class="curiosity-card"><span class="q-mark">?</span>${highlightMatch(c, q)}</div>`
  ).join('');
}

function renderScratchpad(q) {
  const el = document.getElementById('tab-scratchpad');
  const text = allData.scratchpad || 'Working memory is empty';
  el.innerHTML = `<div class="panel"><div class="panel-title">Current Working Memory</div>
    <div class="scratchpad">${highlightMatch(text, q)}</div></div>`;
}

// Search input handler
let searchTimeout;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(renderCurrentTab, 150);
});

async function fetchMindData() {
  try {
    // Fetch main state
    const stateResp = await fetch('/api/state');
    if (!stateResp.ok) throw new Error('state fetch failed');
    const state = await stateResp.json();

    allData.facts = state.facts || [];
    allData.dreams = state.dreams || [];
    allData.memories = state.memories || [];

    // Extract lessons from facts (ones that look like lessons)
    allData.lessons = allData.facts.filter(f =>
      f.toLowerCase().includes('lesson') ||
      f.toLowerCase().includes('learned') ||
      f.includes('—') && (f.includes('never') || f.includes('always') || f.includes('important'))
    );

    // Also try to load lessons from long-term memory if available
    try {
      const ltmResp = await fetch('/api/ltm');
      if (ltmResp.ok) {
        const ltm = await ltmResp.json();
        if (ltm.lessons) allData.lessons = ltm.lessons;
        if (ltm.scratchpad) allData.scratchpad = ltm.scratchpad;
        if (ltm.curiosities) allData.curiosities = ltm.curiosities;
      }
    } catch(e) {}

    // Extract dream insights
    allData.dreams = allData.facts.filter(f =>
      f.toLowerCase().startsWith('dream')
    );

    // If we didn't get separate lessons, extract from facts
    if (allData.lessons.length === 0) {
      allData.lessons = allData.facts.filter(f =>
        !f.toLowerCase().startsWith('dream') &&
        (f.includes('—') || f.includes('should') || f.includes('never') || f.includes('always'))
      );
    }

    // Generate curiosity items from dreams and patterns
    if (allData.curiosities.length === 0) {
      allData.curiosities = allData.facts
        .filter(f => f.includes('?') || f.toLowerCase().includes('curious') || f.toLowerCase().includes('question'))
        .slice(0, 10);
    }

    renderStats();
    renderCurrentTab();

    document.getElementById('connection-status').innerHTML =
      '<span class="heartbeat-dot"></span>live';
  } catch (e) {
    document.getElementById('connection-status').innerHTML =
      '<span style="color:#f7768e">● disconnected</span>';
  }
}

// Also try to fetch scratchpad from brain files
async function fetchScratchpad() {
  try {
    const resp = await fetch('/api/scratchpad');
    if (resp.ok) {
      const data = await resp.json();
      allData.scratchpad = data.content || '';
    }
  } catch(e) {}
}

fetchMindData();
fetchScratchpad();
setInterval(fetchMindData, 5000);
</script>
</body>
</html>
