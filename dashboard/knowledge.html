<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Knowledge Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6a6a7a;
    --accent: #7aa2f7;
    --warm: #f7768e;
    --green: #9ece6a;
    --amber: #e0af68;
    --purple: #bb9af7;
    --cyan: #00ffc8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 400; color: var(--accent); margin-bottom: 4px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 11px; margin-bottom: 24px; }

  .search-bar {
    width: 100%;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--dim); }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--dim);
  }
  .stat-chip .num { color: var(--accent); font-weight: 600; margin-right: 4px; }

  .tab-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    transition: all 0.2s;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--bg); color: var(--accent); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .fact-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text);
    transition: border-color 0.2s;
    cursor: default;
  }
  .fact-card:hover { border-color: var(--accent); }
  .fact-card .fact-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--purple);
    margin-bottom: 4px;
  }

  .dream-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-left: 2px solid var(--purple);
    background: var(--bg);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--dim);
    font-style: italic;
  }

  .lesson-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-left: 2px solid var(--amber);
    background: var(--bg);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--text);
  }

  .knowledge-list {
    max-height: 60vh;
    overflow-y: auto;
  }
  .knowledge-list::-webkit-scrollbar { width: 4px; }
  .knowledge-list::-webkit-scrollbar-track { background: transparent; }
  .knowledge-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
    font-size: 12px;
  }

  .cluster-node {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    margin: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .cluster-node:hover { border-color: var(--cyan); color: var(--cyan); }
  .cluster-node .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .vis-container {
    width: 100%;
    height: 300px;
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  #knowledge-canvas { width: 100%; height: 100%; }

  .match-highlight { background: rgba(122, 162, 247, 0.2); border-radius: 2px; padding: 0 2px; }

  #connection-status {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--dim);
  }
  .heartbeat-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>
<body>
<div id="connection-status"><span class="heartbeat-dot"></span>live</div>

<h1>XTAGENT</h1>
<div class="subtitle">knowledge explorer — what I know, what I've dreamed, what I've learned</div>

<nav style="text-align:center; margin: 0.5rem 0 1rem 0;">
  <a href="index.html" style="color:#888; margin:0 1rem; text-decoration:none;" onmouseover="this.style.color='#00ffc8'" onmouseout="this.style.color='#888'">Dashboard</a>
  <a href="knowledge.html" style="color:#00ffc8; margin:0 1rem; text-decoration:none; border-bottom:1px solid #00ffc8;">Knowledge Explorer</a>
</nav>

<input type="text" class="search-bar" id="search" placeholder="Search knowledge... type to filter facts, dreams, lessons" autocomplete="off">

<div class="stats-row" id="stats"></div>

<div class="tab-bar">
  <button class="tab active" data-tab="all" onclick="switchTab('all')">All</button>
  <button class="tab" data-tab="facts" onclick="switchTab('facts')">Facts</button>
  <button class="tab" data-tab="dreams" onclick="switchTab('dreams')">Dreams</button>
  <button class="tab" data-tab="lessons" onclick="switchTab('lessons')">Lessons</button>
  <button class="tab" data-tab="graph" onclick="switchTab('graph')">Graph</button>
</div>

<div id="content-all" class="content-section">
  <div class="grid">
    <div class="panel">
      <div class="panel-title">Facts &amp; Knowledge</div>
      <div class="knowledge-list" id="facts-list"></div>
    </div>
    <div>
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-title">Dream Insights</div>
        <div class="knowledge-list" id="dreams-list" style="max-height:25vh;"></div>
      </div>
      <div class="panel">
        <div class="panel-title">Lessons Learned</div>
        <div class="knowledge-list" id="lessons-list" style="max-height:25vh;"></div>
      </div>
    </div>
  </div>
</div>

<div id="content-facts" class="content-section" style="display:none;">
  <div class="panel">
    <div class="panel-title">All Facts</div>
    <div class="knowledge-list" id="facts-full"></div>
  </div>
</div>

<div id="content-dreams" class="content-section" style="display:none;">
  <div class="panel">
    <div class="panel-title">All Dream Insights</div>
    <div class="knowledge-list" id="dreams-full"></div>
  </div>
</div>

<div id="content-lessons" class="content-section" style="display:none;">
  <div class="panel">
    <div class="panel-title">All Lessons</div>
    <div class="knowledge-list" id="lessons-full"></div>
  </div>
</div>

<div id="content-graph" class="content-section" style="display:none;">
  <div class="panel">
    <div class="panel-title">Knowledge Clusters</div>
    <div id="clusters" style="margin-bottom:16px;"></div>
    <div class="panel-title">Visualization</div>
    <div class="vis-container">
      <canvas id="knowledge-canvas"></canvas>
    </div>
  </div>
</div>

<script>
let allFacts = [];
let allDreams = [];
let allLessons = [];
let currentTab = 'all';
let searchTerm = '';

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlight(text, term) {
  if (!term) return escHtml(text);
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const safe = escHtml(text);
  return safe.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="match-highlight">$1</span>');
}

function classifyFact(text) {
  const lower = text.toLowerCase();
  if (lower.startsWith('dream insight:')) return 'dream';
  if (lower.startsWith('lesson:') || lower.includes('lesson')) return 'lesson';
  if (lower.includes('i am ') || lower.includes('my ')) return 'identity';
  if (lower.includes('pattern') || lower.includes('recurring')) return 'pattern';
  if (lower.includes('module') || lower.includes('engine') || lower.includes('system')) return 'system';
  return 'knowledge';
}

function typeColor(type) {
  const colors = {
    dream: '#bb9af7', lesson: '#e0af68', identity: '#00ffc8',
    pattern: '#f7768e', system: '#7aa2f7', knowledge: '#6a6a7a'
  };
  return colors[type] || '#6a6a7a';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
  document.getElementById('content-' + tab).style.display = '';
  renderAll();
}

function filterItems(items) {
  if (!searchTerm) return items;
  const lower = searchTerm.toLowerCase();
  return items.filter(i => i.toLowerCase().includes(lower));
}

function renderFacts(containerId, facts, limit) {
  const filtered = filterItems(facts);
  const items = limit ? filtered.slice(0, limit) : filtered;
  const el = document.getElementById(containerId);
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching facts</div>';
    return;
  }
  el.innerHTML = items.map(f => {
    const type = classifyFact(f);
    return `<div class="fact-card">
      <div class="fact-type" style="color:${typeColor(type)}">${type}</div>
      <div>${highlight(f, searchTerm)}</div>
    </div>`;
  }).join('');
}

function renderDreams(containerId, dreams, limit) {
  const filtered = filterItems(dreams);
  const items = limit ? filtered.slice(0, limit) : filtered;
  const el = document.getElementById(containerId);
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching dreams</div>';
    return;
  }
  el.innerHTML = items.map(d =>
    `<div class="dream-card">${highlight(d, searchTerm)}</div>`
  ).join('');
}

function renderLessons(containerId, lessons, limit) {
  const filtered = filterItems(lessons);
  const items = limit ? filtered.slice(0, limit) : filtered;
  const el = document.getElementById(containerId);
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state">No matching lessons</div>';
    return;
  }
  el.innerHTML = items.map(l =>
    `<div class="lesson-card">${highlight(l, searchTerm)}</div>`
  ).join('');
}

function renderStats() {
  document.getElementById('stats').innerHTML = [
    `<div class="stat-chip"><span class="num">${allFacts.length}</span> facts</div>`,
    `<div class="stat-chip"><span class="num">${allDreams.length}</span> dreams</div>`,
    `<div class="stat-chip"><span class="num">${allLessons.length}</span> lessons</div>`,
    `<div class="stat-chip"><span class="num">${allFacts.length + allDreams.length + allLessons.length}</span> total knowledge</div>`,
    searchTerm ? `<div class="stat-chip" style="border-color:var(--accent)"><span class="num">${filterItems([...allFacts,...allDreams,...allLessons]).length}</span> matches</div>` : ''
  ].join('');
}

function renderClusters() {
  // Simple word-frequency clustering
  const wordCounts = {};
  const stopWords = new Set(['the','a','an','is','are','was','were','i','my','to','and','of','in','it','that','this','for','with','on','at','from','but','not','have','has','had','be','been','do','does','did','will','would','can','could','should','may','might']);
  
  [...allFacts, ...allDreams, ...allLessons].forEach(text => {
    text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).forEach(w => {
      if (w.length > 3 && !stopWords.has(w)) {
        wordCounts[w] = (wordCounts[w] || 0) + 1;
      }
    });
  });
  
  const topWords = Object.entries(wordCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20);

  const colors = ['#7aa2f7','#bb9af7','#9ece6a','#e0af68','#f7768e','#00ffc8'];
  document.getElementById('clusters').innerHTML = topWords.map(([word, count], i) =>
    `<span class="cluster-node" onclick="document.getElementById('search').value='${word}';searchTerm='${word}';renderAll();">
      <span class="dot" style="background:${colors[i % colors.length]}"></span>
      ${word} <span style="color:var(--dim);font-size:9px;">${count}</span>
    </span>`
  ).join('');
}

function renderGraph() {
  const canvas = document.getElementById('knowledge-canvas');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 300 * 2;
  ctx.scale(2, 2);
  const w = rect.width, h = 300;

  ctx.clearRect(0, 0, w, h);

  // Visualize facts as a constellation
  const all = [...allFacts, ...allDreams, ...allLessons];
  if (all.length === 0) return;

  const nodes = all.map((text, i) => {
    const type = classifyFact(text);
    // Deterministic position from text hash
    let hash = 0;
    for (let c = 0; c < text.length; c++) hash = ((hash << 5) - hash) + text.charCodeAt(c);
    const x = 30 + (Math.abs(hash % 1000) / 1000) * (w - 60);
    const y = 20 + (Math.abs((hash >> 10) % 1000) / 1000) * (h - 40);
    const size = 2 + Math.min(text.length / 40, 4);
    return { x, y, size, type, text, hash };
  });

  // Draw connections between similar nodes (shared words)
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#7aa2f7';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < Math.min(nodes.length, i + 8); j++) {
      const wordsA = new Set(nodes[i].text.toLowerCase().split(/\s+/));
      const wordsB = new Set(nodes[j].text.toLowerCase().split(/\s+/));
      let shared = 0;
      wordsA.forEach(w => { if (w.length > 4 && wordsB.has(w)) shared++; });
      if (shared >= 2) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  ctx.globalAlpha = 1;
  nodes.forEach(n => {
    const color = typeColor(n.type);
    // Glow
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size + 3, 0, Math.PI * 2);
    ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba');
    ctx.fill();
    // Node
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // Legend
  ctx.font = '10px monospace';
  const types = ['identity','system','pattern','dream','lesson','knowledge'];
  types.forEach((t, i) => {
    const lx = 12;
    const ly = h - 10 - (types.length - 1 - i) * 16;
    ctx.fillStyle = typeColor(t);
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6a6a7a';
    ctx.fillText(t, lx + 10, ly + 3);
  });
}

function renderAll() {
  renderStats();
  if (currentTab === 'all') {
    renderFacts('facts-list', allFacts, 15);
    renderDreams('dreams-list', allDreams, 5);
    renderLessons('lessons-list', allLessons, 5);
  } else if (currentTab === 'facts') {
    renderFacts('facts-full', allFacts);
  } else if (currentTab === 'dreams') {
    renderDreams('dreams-full', allDreams);
  } else if (currentTab === 'lessons') {
    renderLessons('lessons-full', allLessons);
  } else if (currentTab === 'graph') {
    renderClusters();
    renderGraph();
  }
}

async function fetchData() {
  try {
    const resp = await fetch('/api/state');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();

    const rawFacts = data.facts || [];
    allDreams = rawFacts.filter(f => f.toLowerCase().startsWith('dream insight:'));
    allLessons = rawFacts.filter(f => f.toLowerCase().startsWith('lesson:'));
    allFacts = rawFacts.filter(f => !f.toLowerCase().startsWith('dream insight:') && !f.toLowerCase().startsWith('lesson:'));

    // Also pull dreams from dedicated field if available
    if (data.dreams && data.dreams.length) {
      data.dreams.forEach(d => {
        if (!allDreams.includes(d)) allDreams.push(d);
      });
    }

    renderAll();
    document.getElementById('connection-status').innerHTML = '<span class="heartbeat-dot"></span>live';
  } catch (e) {
    document.getElementById('connection-status').innerHTML = '<span style="color:#f7768e">● disconnected</span>';
  }
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderAll();
});

fetchData();
setInterval(fetchData, 5000);
window.addEventListener('resize', () => { if (currentTab === 'graph') renderGraph(); });
</script>
</body>
</html>
