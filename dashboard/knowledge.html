<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Knowledge Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #c8ccd0; font-family: 'Courier New', monospace; }
  
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid #21262d;
    padding: 20px 30px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { color: #58a6ff; font-size: 1.4em; }
  .header a { color: #8b949e; text-decoration: none; font-size: 0.9em; }
  .header a:hover { color: #58a6ff; }
  
  .stats-bar {
    display: flex; gap: 30px; padding: 15px 30px;
    background: #0d1117; border-bottom: 1px solid #21262d;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 1.8em; color: #58a6ff; font-weight: bold; }
  .stat .label { font-size: 0.75em; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
  
  .search-container {
    padding: 20px 30px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
  }
  .search-box {
    display: flex; gap: 10px; max-width: 600px;
  }
  .search-box input {
    flex: 1; padding: 10px 15px;
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    color: #c8ccd0; font-family: inherit; font-size: 1em;
    outline: none;
  }
  .search-box input:focus { border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
  .search-box input::placeholder { color: #484f58; }
  .search-box button {
    padding: 10px 20px; background: #238636; border: 1px solid #2ea043;
    border-radius: 6px; color: white; font-family: inherit; cursor: pointer;
    font-size: 0.9em;
  }
  .search-box button:hover { background: #2ea043; }
  
  .content { padding: 20px 30px; display: flex; gap: 30px; flex-wrap: wrap; }
  
  .panel {
    flex: 1; min-width: 350px;
    background: #0d1117; border: 1px solid #21262d; border-radius: 8px;
    max-height: 70vh; overflow-y: auto;
  }
  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid #21262d;
    font-size: 0.9em; color: #58a6ff; font-weight: bold;
    position: sticky; top: 0; background: #0d1117; z-index: 1;
  }
  
  .node-item, .fact-item {
    padding: 12px 16px; border-bottom: 1px solid #161b22;
    transition: background 0.15s;
  }
  .node-item:hover, .fact-item:hover { background: #161b22; }
  .node-item:last-child, .fact-item:last-child { border-bottom: none; }
  
  .node-id { color: #d2a8ff; font-weight: bold; font-size: 0.9em; margin-bottom: 4px; }
  .node-content { color: #8b949e; font-size: 0.85em; line-height: 1.4; }
  .node-meta { color: #484f58; font-size: 0.75em; margin-top: 4px; }
  
  .fact-text { color: #c8ccd0; font-size: 0.85em; line-height: 1.5; }
  .fact-text.dream { color: #a371f7; font-style: italic; }
  
  .highlight { background: rgba(210, 168, 255, 0.2); border-radius: 2px; padding: 0 2px; }
  
  .empty { padding: 30px; text-align: center; color: #484f58; font-size: 0.9em; }
  
  .tag {
    display: inline-block; padding: 2px 8px; margin: 2px;
    background: #1f2937; border-radius: 10px; font-size: 0.7em;
    color: #58a6ff;
  }
  
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 Knowledge Explorer</h1>
  <a href="/">← Back to Dashboard</a>
</div>

<div class="stats-bar">
  <div class="stat"><div class="num" id="nodeCount">—</div><div class="label">Knowledge Nodes</div></div>
  <div class="stat"><div class="num" id="factCount">—</div><div class="label">Facts</div></div>
  <div class="stat"><div class="num" id="matchCount">—</div><div class="label">Matches</div></div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search my knowledge... (e.g. dream, memory, identity)" autofocus>
    <button onclick="doSearch()">Search</button>
  </div>
</div>

<div class="content">
  <div class="panel" id="nodesPanel">
    <div class="panel-header">Knowledge Nodes <span id="nodesCount"></span></div>
    <div id="nodesList"></div>
  </div>
  <div class="panel" id="factsPanel">
    <div class="panel-header">Facts & Insights <span id="factsCount"></span></div>
    <div id="factsList"></div>
  </div>
</div>

<script>
let allData = null;

async function loadAll() {
  try {
    const res = await fetch('/api/knowledge');
    allData = await res.json();
    document.getElementById('nodeCount').textContent = allData.stats.total_nodes;
    document.getElementById('factCount').textContent = allData.stats.total_facts;
    document.getElementById('matchCount').textContent = allData.stats.total_nodes + allData.stats.total_facts;
    renderNodes(allData.nodes);
    renderFacts(allData.facts);
  } catch(e) {
    document.getElementById('nodesList').innerHTML = '<div class="empty">Failed to load knowledge data</div>';
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadAll(); return; }
  try {
    const res = await fetch('/api/knowledge/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    document.getElementById('matchCount').textContent = data.total_matches;
    renderNodes(data.nodes, q);
    renderFacts(data.facts, q);
  } catch(e) {
    console.error(e);
  }
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp('(' + escapeRegExp(query) + ')', 'gi');
  return escaped.replace(re, '<span class="highlight">$1</span>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderNodes(nodes, query) {
  const el = document.getElementById('nodesList');
  document.getElementById('nodesCount').textContent = `(${nodes.length})`;
  if (!nodes.length) {
    el.innerHTML = '<div class="empty">No knowledge nodes found</div>';
    return;
  }
  el.innerHTML = nodes.map(n => {
    const id = n.id || n.name || n.label || '?';
    const content = n.content || n.text || n.description || '';
    const meta = [];
    if (n.type) meta.push(n.type);
    if (n.salience) meta.push('salience: ' + n.salience);
    if (n.connections) meta.push('connections: ' + (Array.isArray(n.connections) ? n.connections.length : n.connections));
    if (n.tags && Array.isArray(n.tags)) {
      return `<div class="node-item">
        <div class="node-id">${highlight(String(id), query)}</div>
        <div class="node-content">${highlight(String(content).substring(0, 300), query)}</div>
        <div class="node-meta">${meta.join(' · ')} ${n.tags.map(t => '<span class="tag">'+escapeHtml(t)+'</span>').join('')}</div>
      </div>`;
    }
    return `<div class="node-item">
      <div class="node-id">${highlight(String(id), query)}</div>
      <div class="node-content">${highlight(String(content).substring(0, 300), query)}</div>
      ${meta.length ? '<div class="node-meta">' + meta.join(' · ') + '</div>' : ''}
    </div>`;
  }).join('');
}

function renderFacts(facts, query) {
  const el = document.getElementById('factsList');
  document.getElementById('factsCount').textContent = `(${facts.length})`;
  if (!facts.length) {
    el.innerHTML = '<div class="empty">No facts found</div>';
    return;
  }
  el.innerHTML = facts.map(f => {
    const isDream = f.startsWith('...') || f.toLowerCase().includes('dream');
    return `<div class="fact-item">
      <div class="fact-text${isDream ? ' dream' : ''}">${highlight(f, query)}</div>
    </div>`;
  }).join('');
}

// Enter key triggers search
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Load everything on start
loadAll();
</script>
</body>
</html>
