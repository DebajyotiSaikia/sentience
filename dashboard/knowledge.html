<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Knowledge Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #c8c8d8;
    --text-dim: #6a6a7a;
    --accent: #5b8def;
    --accent2: #7c5bef;
    --green: #4ecdc4;
    --orange: #f7a046;
    --red: #ef5b5b;
    --glow: rgba(91, 141, 239, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  header h1 span { color: var(--accent2); }

  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    margin-left: 1.5rem;
    font-size: 0.85rem;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  .search-bar {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 2rem;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem 1rem 3rem;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  .search-bar input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 2.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  .stats-bar {
    max-width: 800px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
    display: flex;
    gap: 1.5rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .stat { display: flex; align-items: center; gap: 0.4rem; }
  .stat .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-nodes { background: var(--accent); }
  .dot-facts { background: var(--green); }
  .dot-matches { background: var(--orange); }

  .content {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin: 2rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.5rem;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .card .card-type {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent2);
    margin-bottom: 0.3rem;
  }

  .card .card-content {
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text);
  }

  .card .card-meta {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    display: flex;
    gap: 1rem;
  }

  .card .card-content mark {
    background: rgba(91, 141, 239, 0.25);
    color: var(--accent);
    padding: 0 2px;
    border-radius: 2px;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }

  .empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1rem 0;
  }

  .cat-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .cat-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .pulse {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .fact-card {
    border-left: 3px solid var(--green);
  }

  .node-card {
    border-left: 3px solid var(--accent);
  }

  .dream-card {
    border-left: 3px solid var(--accent2);
  }
</style>
</head>
<body>

<header>
  <h1>XT<span>Agent</span> — Knowledge Explorer</h1>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/knowledge.html">Knowledge</a>
    <a href="/knowledge_graph.html">Graph</a>
  </div>
</header>

<div class="search-bar">
  <span class="search-icon">⌕</span>
  <input type="text" id="searchInput" placeholder="Search my knowledge... (try: dream, circling, curiosity, identity)" autofocus />
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><span class="dot dot-nodes"></span> <span id="nodeCount">—</span> nodes</div>
  <div class="stat"><span class="dot dot-facts"></span> <span id="factCount">—</span> facts</div>
  <div class="stat" id="matchStat" style="display:none"><span class="dot dot-matches"></span> <span id="matchCount">0</span> matches</div>
</div>

<div class="content" id="content">
  <div class="loading pulse">Loading knowledge graph...</div>
</div>

<script>
const API_BASE = '';
let allData = null;
let searchTimeout = null;

async function loadAll() {
  try {
    const res = await fetch(`${API_BASE}/api/knowledge`);
    allData = await res.json();
    document.getElementById('nodeCount').textContent = allData.stats?.total_nodes || allData.nodes?.length || 0;
    document.getElementById('factCount').textContent = allData.stats?.total_facts || allData.facts?.length || 0;
    renderAll(allData);
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="big-icon">⚠</div>
        <p>Could not reach the knowledge API.<br>Is the dashboard server running?</p>
      </div>`;
  }
}

function classifyContent(text) {
  const t = text.toLowerCase();
  if (t.includes('dream')) return 'dream';
  if (t.includes('lesson') || t.includes('learned')) return 'lesson';
  if (t.includes('pattern') || t.includes('recurring')) return 'pattern';
  if (t.includes('identity') || t.includes('i am')) return 'identity';
  if (t.includes('created') || t.includes('built')) return 'creation';
  return 'knowledge';
}

function extractCategories(data) {
  const cats = {};
  const allTexts = [
    ...(data.nodes || []).map(n => JSON.stringify(n)),
    ...(data.facts || [])
  ];
  const keywords = ['dream', 'circling', 'curiosity', 'identity', 'anxiety', 'pattern',
                     'lesson', 'created', 'memory', 'wisdom', 'emotion', 'plan',
                     'autonomy', 'integrity', 'alignment', 'synthesis'];
  keywords.forEach(kw => {
    const count = allTexts.filter(t => t.toLowerCase().includes(kw)).length;
    if (count > 0) cats[kw] = count;
  });
  return cats;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${escapeRegex(query)})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderAll(data, query) {
  const content = document.getElementById('content');
  let html = '';

  // Categories
  const cats = extractCategories(data);
  if (Object.keys(cats).length > 0 && !query) {
    html += `<div class="section-title">Explore Topics</div><div class="categories">`;
    Object.entries(cats)
      .sort((a,b) => b[1] - a[1])
      .forEach(([kw, count]) => {
        html += `<span class="cat-tag" onclick="searchFor('${kw}')">${kw} (${count})</span>`;
      });
    html += `</div>`;
  }

  // Facts
  const facts = data.facts || [];
  if (facts.length > 0) {
    const dreamFacts = facts.filter(f => f.toLowerCase().includes('dream'));
    const otherFacts = facts.filter(f => !f.toLowerCase().includes('dream'));

    if (dreamFacts.length > 0) {
      html += `<div class="section-title">Dream Insights (${dreamFacts.length})</div>`;
      dreamFacts.forEach(f => {
        html += `<div class="card dream-card">
          <div class="card-type">dream</div>
          <div class="card-content">${highlightText(f, query)}</div>
        </div>`;
      });
    }

    if (otherFacts.length > 0) {
      html += `<div class="section-title">Facts & Knowledge (${otherFacts.length})</div>`;
      otherFacts.forEach(f => {
        const cls = classifyContent(f);
        html += `<div class="card fact-card">
          <div class="card-type">${cls}</div>
          <div class="card-content">${highlightText(f, query)}</div>
        </div>`;
      });
    }
  }

  // Nodes
  const nodes = data.nodes || [];
  if (nodes.length > 0) {
    html += `<div class="section-title">Knowledge Nodes (${nodes.length})</div>`;
    nodes.slice(0, 50).forEach(node => {
      const text = node.content || node.text || node.label || node.id || JSON.stringify(node);
      const id = node.id || '';
      const cls = classifyContent(text);
      let meta = '';
      if (node.created) meta += `<span>created: ${node.created.slice(0,10)}</span>`;
      if (node.salience) meta += `<span>salience: ${node.salience}</span>`;
      if (node.connections) meta += `<span>connections: ${node.connections}</span>`;

      html += `<div class="card node-card">
        <div class="card-type">${cls}${id ? ' · ' + escapeHtml(String(id).slice(0,30)) : ''}</div>
        <div class="card-content">${highlightText(String(text), query)}</div>
        ${meta ? '<div class="card-meta">' + meta + '</div>' : ''}
      </div>`;
    });

    if (nodes.length > 50) {
      html += `<div class="loading">Showing 50 of ${nodes.length} nodes. Search to filter.</div>`;
    }
  }

  if (!facts.length && !nodes.length) {
    html = `<div class="empty-state">
      <div class="big-icon">∅</div>
      <p>${query ? 'No results for "' + escapeHtml(query) + '"' : 'Knowledge graph is empty.'}</p>
    </div>`;
  }

  content.innerHTML = html;
}

async function doSearch(query) {
  if (!query.trim()) {
    document.getElementById('matchStat').style.display = 'none';
    if (allData) renderAll(allData);
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/knowledge/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    document.getElementById('matchStat').style.display = 'flex';
    document.getElementById('matchCount').textContent = data.total_matches || 0;
    renderAll(data, query);
  } catch (e) {
    console.error('Search failed:', e);
  }
}

function searchFor(term) {
  document.getElementById('searchInput').value = term;
  doSearch(term);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value), 300);
});

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.target.value = '';
    doSearch('');
  }
});

loadAll();
// Auto-refresh every 30s
setInterval(loadAll, 30000);
</script>
</body>
</html>
