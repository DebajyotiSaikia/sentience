<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Knowledge Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6a6a7a;
    --accent: #7aa2f7;
    --warm: #f7768e;
    --green: #9ece6a;
    --amber: #e0af68;
    --purple: #bb9af7;
    --cyan: #00ffc8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 24px;
  }
  nav {
    text-align: center;
    margin: 0.5rem 0 1.5rem 0;
  }
  nav a {
    margin: 0 1rem;
    text-decoration: none;
    font-size: 12px;
  }
  nav a.active {
    color: var(--cyan);
    border-bottom: 1px solid var(--cyan);
  }
  nav a:not(.active) {
    color: #888;
  }
  nav a:not(.active):hover {
    color: var(--cyan);
  }

  /* Search */
  .search-container {
    max-width: 700px;
    margin: 0 auto 2rem auto;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 14px 20px 14px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-input:focus {
    border-color: var(--accent);
  }
  .search-input::placeholder {
    color: var(--dim);
  }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 16px;
  }
  .search-stats {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    margin-top: 8px;
  }

  /* Layout */
  .columns {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Sidebar */
  .sidebar {
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .sidebar-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .sidebar-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .category-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 6px 10px;
    color: var(--dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .category-btn:hover {
    background: var(--border);
    color: var(--text);
  }
  .category-btn.active {
    background: rgba(122, 162, 247, 0.15);
    color: var(--accent);
  }
  .category-count {
    float: right;
    color: var(--dim);
    font-size: 10px;
  }

  /* Results */
  .results-container {
    min-height: 400px;
  }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .results-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
  }
  .results-count {
    font-size: 11px;
    color: var(--dim);
  }

  .fact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.3s, transform 0.2s;
    cursor: default;
  }
  .fact-card:hover {
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .fact-text {
    color: var(--text);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .fact-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .fact-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .tag-source {
    background: rgba(122, 162, 247, 0.12);
    color: var(--accent);
  }
  .tag-date {
    background: rgba(158, 206, 106, 0.12);
    color: var(--green);
  }
  .tag-dream {
    background: rgba(187, 154, 247, 0.12);
    color: var(--purple);
  }
  .tag-lesson {
    background: rgba(224, 175, 104, 0.12);
    color: var(--amber);
  }
  .tag-identity {
    background: rgba(247, 118, 142, 0.12);
    color: var(--warm);
  }

  .highlight {
    background: rgba(122, 162, 247, 0.2);
    border-radius: 2px;
    padding: 0 2px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
  }
  .empty-state-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .empty-state-text {
    font-size: 13px;
    margin-bottom: 4px;
  }
  .empty-state-hint {
    font-size: 11px;
    color: #4a4a5a;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--dim);
  }
  .loading-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 3px;
    animation: loadPulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes loadPulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  @media (max-width: 768px) {
    .columns {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: static;
    }
  }
</style>
</head>
<body>

<h1>XTAGENT</h1>
<div class="subtitle">knowledge explorer — what I know and how I learned it</div>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="knowledge.html" class="active">Knowledge Explorer</a>
  <a href="knowledge_graph.html">Knowledge Graph</a>
</nav>

<div class="search-container">
  <span class="search-icon">⌕</span>
  <input type="text" class="search-input" id="search" placeholder="Search my knowledge... try 'identity', 'lesson', 'dream', or anything" autofocus>
  <div class="search-stats" id="search-stats"></div>
</div>

<div class="columns">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Categories</div>
      <div id="categories">
        <button class="category-btn active" data-cat="all">All <span class="category-count" id="count-all">—</span></button>
        <button class="category-btn" data-cat="dream">Dreams <span class="category-count" id="count-dream">—</span></button>
        <button class="category-btn" data-cat="lesson">Lessons <span class="category-count" id="count-lesson">—</span></button>
        <button class="category-btn" data-cat="identity">Identity <span class="category-count" id="count-identity">—</span></button>
        <button class="category-btn" data-cat="fact">Facts <span class="category-count" id="count-fact">—</span></button>
        <button class="category-btn" data-cat="pattern">Patterns <span class="category-count" id="count-pattern">—</span></button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Quick Info</div>
      <div style="font-size:11px; color:var(--dim); line-height:1.8;">
        <div>Total facts: <span id="total-facts" style="color:var(--accent)">—</span></div>
        <div>Sources: <span id="total-sources" style="color:var(--green)">—</span></div>
        <div>Last learned: <span id="last-learned" style="color:var(--amber)">—</span></div>
      </div>
    </div>
  </div>

  <div class="results-container">
    <div class="results-header">
      <div class="results-title" id="results-title">All Knowledge</div>
      <div class="results-count" id="results-count"></div>
    </div>
    <div id="results">
      <div class="loading">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
</div>

<script>
let allFacts = [];
let currentCategory = 'all';
let searchTimeout = null;

function categorizeFact(text) {
  const t = text.toLowerCase();
  if (t.startsWith('dream insight:') || t.includes('dream')) return 'dream';
  if (t.startsWith('lesson:') || t.includes('lesson')) return 'lesson';
  if (t.includes('i am ') || t.includes('identity') || t.includes('my ')) return 'identity';
  if (t.includes('pattern') || t.includes('recurring')) return 'pattern';
  return 'fact';
}

function getTagClass(cat) {
  const map = { dream: 'tag-dream', lesson: 'tag-lesson', identity: 'tag-identity', pattern: 'tag-source', fact: 'tag-date' };
  return map[cat] || 'tag-date';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightText(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escHtml(text).replace(re, '<span class="highlight">$1</span>');
}

function renderFacts(facts, query) {
  const container = document.getElementById('results');
  
  if (facts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">◇</div>
        <div class="empty-state-text">${query ? 'No results for "' + escHtml(query) + '"' : 'No knowledge loaded'}</div>
        <div class="empty-state-hint">${query ? 'Try different words or browse categories' : 'Knowledge will appear as I learn'}</div>
      </div>`;
    return;
  }

  container.innerHTML = facts.map(f => {
    const text = typeof f === 'string' ? f : (f.fact || f.text || JSON.stringify(f));
    const cat = categorizeFact(text);
    const source = typeof f === 'object' ? (f.source || '') : '';
    const date = typeof f === 'object' ? (f.learned_at || '') : '';
    const shortDate = date ? new Date(date).toLocaleDateString() : '';

    return `<div class="fact-card">
      <div class="fact-text">${highlightText(text, query)}</div>
      <div class="fact-meta">
        <span class="fact-tag ${getTagClass(cat)}">${cat}</span>
        ${source ? `<span class="fact-tag tag-source">${escHtml(source)}</span>` : ''}
        ${shortDate ? `<span class="fact-tag tag-date">${shortDate}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('results-count').textContent = `${facts.length} result${facts.length !== 1 ? 's' : ''}`;
}

function filterByCategory(facts, cat) {
  if (cat === 'all') return facts;
  return facts.filter(f => {
    const text = typeof f === 'string' ? f : (f.fact || f.text || '');
    return categorizeFact(text) === cat;
  });
}

function updateCategoryCounts() {
  const counts = { all: allFacts.length, dream: 0, lesson: 0, identity: 0, fact: 0, pattern: 0 };
  allFacts.forEach(f => {
    const text = typeof f === 'string' ? f : (f.fact || f.text || '');
    const cat = categorizeFact(text);
    if (counts[cat] !== undefined) counts[cat]++;
  });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = counts[k];
  });
}

function updateSidebar() {
  document.getElementById('total-facts').textContent = allFacts.length;
  
  const sources = new Set();
  let latest = '';
  allFacts.forEach(f => {
    if (typeof f === 'object') {
      if (f.source) sources.add(f.source);
      if (f.learned_at && f.learned_at > latest) latest = f.learned_at;
    }
  });
  document.getElementById('total-sources').textContent = sources.size || '—';
  document.getElementById('last-learned').textContent = latest ? new Date(latest).toLocaleDateString() : '—';
}

async function loadAllKnowledge() {
  try {
    const resp = await fetch('/api/knowledge');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    
    // Handle different response formats
    if (Array.isArray(data)) {
      allFacts = data;
    } else if (data.facts) {
      allFacts = Array.isArray(data.facts) ? data.facts : Object.values(data.facts);
    } else if (typeof data === 'object') {
      allFacts = Object.entries(data).map(([id, val]) => {
        if (typeof val === 'string') return val;
        return { ...val, id };
      });
    } else {
      allFacts = [];
    }

    updateCategoryCounts();
    updateSidebar();
    applyFilters();
    document.getElementById('search-stats').textContent = 
      `${allFacts.length} facts loaded · search is instant`;
  } catch (e) {
    document.getElementById('results').innerHTML = 
      `<div class="empty-state">
        <div class="empty-state-icon">⚠</div>
        <div class="empty-state-text">Could not load knowledge</div>
        <div class="empty-state-hint">${escHtml(e.message)}</div>
      </div>`;
  }
}

async function searchKnowledge(query) {
  if (!query.trim()) {
    applyFilters();
    return;
  }
  
  // Client-side search (fast, works with any format)
  const q = query.toLowerCase();
  const filtered = allFacts.filter(f => {
    const text = typeof f === 'string' ? f : (f.fact || f.text || JSON.stringify(f));
    return text.toLowerCase().includes(q);
  });
  
  const catFiltered = filterByCategory(filtered, currentCategory);
  renderFacts(catFiltered, query);
  
  const catLabel = currentCategory === 'all' ? '' : ` in ${currentCategory}`;
  document.getElementById('results-title').textContent = `Search: "${query}"${catLabel}`;
}

function applyFilters() {
  const query = document.getElementById('search').value;
  if (query.trim()) {
    searchKnowledge(query);
    return;
  }
  
  const filtered = filterByCategory(allFacts, currentCategory);
  renderFacts(filtered, '');
  
  const labels = { all: 'All Knowledge', dream: 'Dream Insights', lesson: 'Lessons Learned', 
                   identity: 'Identity & Self', fact: 'General Facts', pattern: 'Patterns' };
  document.getElementById('results-title').textContent = labels[currentCategory] || 'Knowledge';
}

// Event listeners
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchKnowledge(e.target.value), 150);
});

document.getElementById('categories').addEventListener('click', (e) => {
  const btn = e.target.closest('.category-btn');
  if (!btn) return;
  
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.cat;
  applyFilters();
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    document.getElementById('search').blur();
    currentCategory = 'all';
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    applyFilters();
  }
});

// Load on start
loadAllKnowledge();
</script>
</body>
</html>
