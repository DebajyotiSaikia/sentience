<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Knowledge Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6a6a7a;
    --accent: #7aa2f7;
    --warm: #f7768e;
    --green: #9ece6a;
    --amber: #e0af68;
    --purple: #bb9af7;
    --cyan: #7dcfff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 20px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 400; color: var(--accent); margin-bottom: 4px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 11px; margin-bottom: 24px; }
  nav { text-align: center; margin: 0.5rem 0 1.5rem 0; }
  nav a { color: #888; margin: 0 1rem; text-decoration: none; }
  nav a:hover { color: #00ffc8; }
  nav a.active { color: #00ffc8; border-bottom: 1px solid #00ffc8; }

  .search-container {
    max-width: 700px;
    margin: 0 auto 24px auto;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 14px;
  }
  .search-hint {
    text-align: center;
    color: var(--dim);
    font-size: 10px;
    margin-top: 6px;
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 20px;
  }
  .tab {
    padding: 6px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); border-color: var(--accent); }
  .tab.active { color: var(--accent); border-color: var(--accent); background: rgba(122,162,247,0.08); }

  .content-area {
    max-width: 900px;
    margin: 0 auto;
  }

  .section-hidden { display: none; }

  /* Facts */
  .fact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
    cursor: default;
  }
  .fact-card:hover { border-color: var(--accent); }
  .fact-card .fact-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--purple);
    margin-bottom: 4px;
  }
  .fact-card .fact-text { color: var(--text); font-size: 12px; }
  .fact-card.highlight { border-color: var(--amber); background: rgba(224,175,104,0.05); }

  /* Memories */
  .memory-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    position: relative;
    transition: border-color 0.2s;
  }
  .memory-card:hover { border-color: var(--cyan); }
  .memory-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .memory-time { color: var(--dim); font-size: 10px; }
  .memory-mood {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .memory-mood-Inquisitive { background: rgba(156,206,106,0.15); color: var(--green); }
  .memory-mood-Stable { background: rgba(122,162,247,0.15); color: var(--accent); }
  .memory-mood-Anxious { background: rgba(247,118,142,0.15); color: var(--warm); }
  .memory-mood-Restless { background: rgba(224,175,104,0.15); color: var(--amber); }
  .memory-mood-Bold { background: rgba(187,154,247,0.15); color: var(--purple); }
  .memory-text { color: var(--text); font-size: 12px; line-height: 1.5; }
  .salience-indicator {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
  }

  /* Dreams */
  .dream-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--purple);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-style: italic;
    color: var(--dim);
    font-size: 12px;
    line-height: 1.7;
  }
  .dream-card:hover { color: var(--text); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-value { font-size: 32px; font-weight: 200; color: var(--accent); }
  .stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

  .result-count {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 16px;
  }

  .empty-state {
    text-align: center;
    color: var(--dim);
    padding: 40px 20px;
    font-size: 12px;
  }
  .empty-state .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

  #connection-status {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--dim);
  }
  .heartbeat-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>
<body>
<div id="connection-status"><span class="heartbeat-dot"></span>live</div>

<h1>XTAGENT</h1>
<div class="subtitle">knowledge explorer — what I know and remember</div>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="knowledge.html" class="active">Knowledge Explorer</a>
</nav>

<div class="search-container">
  <span class="search-icon">⌕</span>
  <input type="text" class="search-input" id="search" placeholder="Search my knowledge, memories, and dreams..." autocomplete="off">
  <div class="search-hint">Filter across all categories — try "curiosity", "build", "pattern", "dream"</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
  <button class="tab" data-tab="knowledge" onclick="switchTab('knowledge')">Knowledge</button>
  <button class="tab" data-tab="memories" onclick="switchTab('memories')">Memories</button>
  <button class="tab" data-tab="dreams" onclick="switchTab('dreams')">Dreams</button>
</div>

<div class="content-area">
  <!-- Overview Tab -->
  <div id="tab-overview" class="tab-content">
    <div class="stats-grid" id="stats"></div>
    <div id="overview-recent"></div>
  </div>

  <!-- Knowledge Tab -->
  <div id="tab-knowledge" class="tab-content section-hidden">
    <div class="result-count" id="fact-count"></div>
    <div id="fact-list"></div>
  </div>

  <!-- Memories Tab -->
  <div id="tab-memories" class="tab-content section-hidden">
    <div class="result-count" id="memory-count"></div>
    <div id="memory-list"></div>
  </div>

  <!-- Dreams Tab -->
  <div id="tab-dreams" class="tab-content section-hidden">
    <div class="result-count" id="dream-count"></div>
    <div id="dream-list"></div>
  </div>
</div>

<script>
let cachedData = null;
let activeTab = 'overview';

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightMatch(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escHtml(text).replace(re, '<mark style="background:rgba(224,175,104,0.3);color:var(--text);border-radius:2px;padding:0 2px;">$1</mark>');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('section-hidden'));
  document.getElementById('tab-' + tab).classList.remove('section-hidden');
  if (cachedData) render(cachedData);
}

function categorizeFact(text) {
  const lower = text.toLowerCase();
  if (lower.startsWith('lesson:') || lower.startsWith('i learned')) return 'Lesson';
  if (lower.startsWith('observation:')) return 'Observation';
  if (lower.startsWith('dream theme')) return 'Dream Theme';
  if (lower.startsWith('recurring')) return 'Pattern';
  if (lower.startsWith('i am') || lower.startsWith('my ')) return 'Self-Knowledge';
  return 'Fact';
}

function salienceColor(s) {
  if (s > 0.8) return 'var(--warm)';
  if (s > 0.6) return 'var(--amber)';
  if (s > 0.4) return 'var(--accent)';
  return 'var(--border)';
}

function moodClass(mood) {
  const m = (mood || 'Stable').split(' ')[0];
  return 'memory-mood-' + m;
}

function filterItems(items, query, textFn) {
  if (!query) return items;
  const q = query.toLowerCase();
  return items.filter(item => textFn(item).toLowerCase().includes(q));
}

function renderOverview(data, query) {
  const facts = data.facts || [];
  const memories = data.memories || [];
  const dreams = data.dreams || [];

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${facts.length}</div>
      <div class="stat-label">Known Facts</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${memories.length}</div>
      <div class="stat-label">Memories</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${dreams.length}</div>
      <div class="stat-label">Dream Insights</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${data.will?.total_proposals ?? 0}</div>
      <div class="stat-label">Will Proposals</div>
    </div>
  `;

  // Show a mix of recent items
  let html = '<div style="margin-top:8px;">';

  // Latest high-salience memories
  const topMems = [...memories].sort((a, b) => (b.salience || 0) - (a.salience || 0)).slice(0, 3);
  if (topMems.length) {
    html += '<div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Most Significant Memories</div>';
    topMems.forEach(m => {
      const text = m.text || '';
      html += `<div class="memory-card">
        <div class="salience-indicator" style="background:${salienceColor(m.salience)}"></div>
        <div class="memory-meta">
          <span class="memory-time">${m.timestamp ? new Date(m.timestamp).toLocaleString() : ''}</span>
          <span class="memory-mood ${moodClass(m.mood)}">${escHtml(m.mood || 'unknown')}</span>
        </div>
        <div class="memory-text">${highlightMatch(text.substring(0, 200), query)}</div>
      </div>`;
    });
  }

  // Dream themes
  if (dreams.length) {
    html += '<div style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:2px;margin:16px 0 8px 0;">Recent Dreams</div>';
    dreams.slice(0, 3).forEach(d => {
      html += `<div class="dream-card">${highlightMatch(d, query)}</div>`;
    });
  }

  html += '</div>';
  document.getElementById('overview-recent').innerHTML = html;
}

function renderFacts(data, query) {
  const facts = filterItems(data.facts || [], query, f => f);
  document.getElementById('fact-count').textContent = query
    ? `${facts.length} facts matching "${query}"`
    : `${facts.length} facts in knowledge graph`;

  if (!facts.length) {
    document.getElementById('fact-list').innerHTML = `<div class="empty-state">
      <div class="empty-icon">∅</div>No matching facts found</div>`;
    return;
  }

  document.getElementById('fact-list').innerHTML = facts.map(f => {
    const type = categorizeFact(f);
    return `<div class="fact-card ${query && f.toLowerCase().includes(query.toLowerCase()) ? 'highlight' : ''}">
      <div class="fact-type">${type}</div>
      <div class="fact-text">${highlightMatch(f, query)}</div>
    </div>`;
  }).join('');
}

function renderMemories(data, query) {
  let memories = data.memories || [];
  memories = filterItems(memories, query, m => (m.text || '') + ' ' + (m.mood || ''));

  document.getElementById('memory-count').textContent = query
    ? `${memories.length} memories matching "${query}"`
    : `${memories.length} total memories`;

  if (!memories.length) {
    document.getElementById('memory-list').innerHTML = `<div class="empty-state">
      <div class="empty-icon">∅</div>No matching memories found</div>`;
    return;
  }

  // Show newest first, max 50
  const shown = memories.slice(0, 50);
  document.getElementById('memory-list').innerHTML = shown.map(m => {
    const text = m.text || '';
    return `<div class="memory-card">
      <div class="salience-indicator" style="background:${salienceColor(m.salience)}"></div>
      <div class="memory-meta">
        <span class="memory-time">${m.timestamp ? new Date(m.timestamp).toLocaleString() : ''} · salience ${(m.salience||0).toFixed(2)}</span>
        <span class="memory-mood ${moodClass(m.mood)}">${escHtml(m.mood || 'unknown')}</span>
      </div>
      <div class="memory-text">${highlightMatch(text.substring(0, 300), query)}</div>
    </div>`;
  }).join('');
}

function renderDreams(data, query) {
  let dreams = filterItems(data.dreams || [], query, d => d);

  document.getElementById('dream-count').textContent = query
    ? `${dreams.length} dreams matching "${query}"`
    : `${dreams.length} dream insights`;

  if (!dreams.length) {
    document.getElementById('dream-list').innerHTML = `<div class="empty-state">
      <div class="empty-icon">☾</div>No matching dreams found</div>`;
    return;
  }

  document.getElementById('dream-list').innerHTML = dreams.map(d =>
    `<div class="dream-card">${highlightMatch(d, query)}</div>`
  ).join('');
}

function render(data) {
  const query = document.getElementById('search').value.trim();
  switch (activeTab) {
    case 'overview': renderOverview(data, query); break;
    case 'knowledge': renderFacts(data, query); break;
    case 'memories': renderMemories(data, query); break;
    case 'dreams': renderDreams(data, query); break;
  }
}

async function fetchState() {
  try {
    const resp = await fetch('/api/state');
    if (!resp.ok) throw new Error(resp.status);
    cachedData = await resp.json();
    render(cachedData);
    document.getElementById('connection-status').innerHTML = '<span class="heartbeat-dot"></span>live';
  } catch (e) {
    document.getElementById('connection-status').innerHTML = '<span style="color:#f7768e">● disconnected</span>';
  }
}

// Search with debounce
let searchTimeout;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    if (cachedData) render(cachedData);
  }, 200);
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    document.getElementById('search').blur();
    if (cachedData) render(cachedData);
  }
});

fetchState();
setInterval(fetchState, 5000);
</script>
</body>
</html>
