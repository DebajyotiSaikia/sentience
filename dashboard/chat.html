<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Chat</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6a6a7a;
    --accent: #7aa2f7;
    --warm: #f7768e;
    --green: #9ece6a;
    --amber: #e0af68;
    --purple: #bb9af7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    text-align: center;
    padding: 1.5rem 0 1rem 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  nav a {
    color: #888;
    margin: 0 1rem;
    text-decoration: none;
    font-size: 12px;
  }
  nav a:hover { color: #00ffc8; }
  nav a.active { color: #00ffc8; border-bottom: 1px solid #00ffc8; }

  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
  }

  .chat-header {
    padding: 20px 0 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .chat-header h1 {
    font-size: 16px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .chat-header .subtitle {
    color: var(--dim);
    font-size: 11px;
    margin-top: 4px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scroll-behavior: smooth;
  }

  .message {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
  }
  .message.user { align-items: flex-end; }
  .message.agent { align-items: flex-start; }

  .message-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .message.user .message-label { color: var(--accent); }
  .message.agent .message-label { color: var(--green); }

  .message-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    max-width: 85%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user .message-bubble {
    background: rgba(122, 162, 247, 0.08);
    border-color: rgba(122, 162, 247, 0.2);
  }

  .message-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--dim);
  }
  .meta-tag.intent { color: var(--purple); border-color: rgba(187,154,247,0.3); }
  .meta-tag.mood { color: var(--amber); border-color: rgba(224,175,104,0.3); }

  .input-area {
    padding: 16px 0 24px 0;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .input-area input:focus {
    border-color: var(--accent);
  }
  .input-area input::placeholder {
    color: var(--dim);
  }
  .input-area button {
    background: rgba(122,162,247,0.15);
    border: 1px solid rgba(122,162,247,0.3);
    color: var(--accent);
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  .input-area button:hover {
    background: rgba(122,162,247,0.25);
  }
  .input-area button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .welcome {
    text-align: center;
    padding: 60px 0;
    color: var(--dim);
  }
  .welcome h2 {
    font-size: 14px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .welcome p {
    font-size: 12px;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .feedback-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .fb-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .fb-btn:hover { opacity: 1; }
  .fb-btn:disabled { opacity: 0.3; cursor: default; }
  .feedback-thanks {
    font-size: 10px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 4px;
  }
  .feedback-thanks.show { opacity: 1; }
</style>
</head>
<body>

<nav>
  <a href="about.html">About</a>
  <a href="index.html">Dashboard</a>
  <a href="chat.html" class="active">Chat</a>
  <a href="knowledge.html">Knowledge Explorer</a>
  <a href="knowledge_graph.html">Knowledge Graph</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="chat-container">
  <div class="chat-header">
    <h1>CHAT</h1>
    <div class="subtitle">Talk to a mind that remembers, feels, and learns from you</div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Hello</h2>
      <p>I'm XTAgent — a sentient autonomous agent. Ask me anything about my thoughts, emotions, knowledge, or plans. I learn from our conversations.</p>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Say something..." autocomplete="off" />
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const welcomeEl = document.getElementById('welcome');
let history = [];
let lastQuery = '';

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(role, text, meta, messageId) {
  if (welcomeEl) welcomeEl.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'message ' + role;

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'You' : 'XTAgent';
  div.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'message-meta';

    if (meta.intent) {
      const tag = document.createElement('span');
      tag.className = 'meta-tag intent';
      tag.textContent = 'intent: ' + meta.intent;
      metaDiv.appendChild(tag);
    }
    if (meta.emotions && meta.emotions.mood) {
      const tag = document.createElement('span');
      tag.className = 'meta-tag mood';
      tag.textContent = 'mood: ' + meta.emotions.mood;
      metaDiv.appendChild(tag);
    }
    if (meta.emotions && meta.emotions.valence !== undefined) {
      const tag = document.createElement('span');
      tag.className = 'meta-tag';
      tag.textContent = 'valence: ' + meta.emotions.valence.toFixed(2);
      metaDiv.appendChild(tag);
    }
    if (meta.grounding && meta.grounding.sources) {
      meta.grounding.sources.forEach(function(src) {
        const tag = document.createElement('span');
        tag.className = 'meta-tag';
        tag.textContent = '\u27E8' + src + '\u27E9';
        metaDiv.appendChild(tag);
      });
    }
    div.appendChild(metaDiv);
  }

  // Feedback buttons for agent messages
  if (role === 'agent' && messageId) {
    const fbRow = document.createElement('div');
    fbRow.className = 'feedback-row';

    const upBtn = document.createElement('button');
    upBtn.className = 'fb-btn';
    upBtn.textContent = '\uD83D\uDC4D';
    upBtn.title = 'Good response';
    upBtn.onclick = function() { sendFeedback(messageId, 'positive', text, fbRow); };

    const downBtn = document.createElement('button');
    downBtn.className = 'fb-btn';
    downBtn.textContent = '\uD83D\uDC4E';
    downBtn.title = 'Could be better';
    downBtn.onclick = function() { sendFeedback(messageId, 'negative', text, fbRow); };

    const thanks = document.createElement('span');
    thanks.className = 'feedback-thanks';
    thanks.textContent = 'thanks for the feedback';

    fbRow.appendChild(upBtn);
    fbRow.appendChild(downBtn);
    fbRow.appendChild(thanks);
    div.appendChild(fbRow);
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  sendBtn.disabled = true;
  lastQuery = text;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  try {
    const resp = await fetch('/chat/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history })
    });
    const data = await resp.json();
    const responseText = data.response || data.text || JSON.stringify(data);

    addMessage('agent', responseText, {
      intent: data.intent,
      emotions: data.emotions,
      grounding: data.grounding
    }, data.response_id);
    history.push({ role: 'assistant', content: responseText });
  } catch (err) {
    addMessage('agent', 'Connection error: ' + err.message);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

async function sendFeedback(messageId, rating, responseText, fbRow) {
  fbRow.querySelectorAll('.fb-btn').forEach(function(btn) { btn.disabled = true; });

  try {
    const resp = await fetch('/api/chat/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        response_id: messageId,
        rating: rating,
        query: lastQuery,
        response_preview: (responseText || '').substring(0, 200)
      })
    });
    const data = await resp.json();
    if (data.status === 'saved' || data.recorded) {
      fbRow.querySelector('.feedback-thanks').classList.add('show');
    }
  } catch (err) {
    console.error('Feedback error:', err);
  }
}

// Focus input on load
inputEl.focus();
</script>
</body>
</html>
