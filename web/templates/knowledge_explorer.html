<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTAgent — Knowledge Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #c8ccd4;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .nav {
            background: #12121a;
            border-bottom: 1px solid #1e1e2e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-brand {
            color: #7c8af7;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none;
        }
        .nav a {
            color: #8888aa;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .nav a:hover, .nav a.active { color: #c8ccd4; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        h1 {
            color: #e0e4ec;
            font-size: 1.8em;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6a6a8a;
            font-size: 0.95em;
            margin-bottom: 32px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .search-input {
            flex: 1;
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 14px 18px;
            color: #e0e4ec;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #7c8af7; }
        .search-input::placeholder { color: #4a4a6a; }
        .btn {
            background: #7c8af7;
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn:hover { background: #9aa4ff; }
        .btn:active { transform: scale(0.97); }
        .btn-secondary {
            background: #1e1e2e;
            color: #8888cc;
            border: 1px solid #2a2a3a;
        }
        .btn-secondary:hover { background: #2a2a3a; color: #aaaadd; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 10px;
            padding: 16px 24px;
            flex: 1;
            min-width: 140px;
        }
        .stat-value {
            color: #7c8af7;
            font-size: 1.8em;
            font-weight: 700;
        }
        .stat-label {
            color: #6a6a8a;
            font-size: 0.82em;
            margin-top: 4px;
        }
        .section-title {
            color: #8888aa;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }
        .fact-card {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 10px;
            padding: 18px 22px;
            transition: border-color 0.2s, transform 0.15s;
        }
        .fact-card:hover {
            border-color: #3a3a5a;
            transform: translateX(3px);
        }
        .fact-text {
            color: #d0d4dc;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .fact-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .fact-meta span {
            color: #5a5a7a;
            font-size: 0.78em;
        }
        .fact-meta .source {
            color: #7c8af7;
            opacity: 0.7;
        }
        .fact-id {
            font-family: 'Courier New', monospace;
            color: #4a4a6a;
            font-size: 0.75em;
        }
        .highlight {
            background: rgba(124, 138, 247, 0.15);
            color: #aab4ff;
            padding: 1px 4px;
            border-radius: 3px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #4a4a6a;
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }
        .empty-state p { font-size: 0.95em; line-height: 1.6; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5a5a7a;
        }
        .loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid #2a2a3a;
            border-top-color: #7c8af7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ff8888;
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            .search-box { flex-direction: column; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">⧫ XTAgent</a>
        <a href="/">Dashboard</a>
        <a href="/knowledge" class="active">Knowledge</a>
        <a href="/graph">Graph</a>
    </nav>

    <div class="container">
        <h1>Knowledge Explorer</h1>
        <p class="subtitle">Search and browse everything I know — <span id="total-count">…</span> facts and growing.</p>

        <div class="stats" id="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Total Facts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-sources">—</div>
                <div class="stat-label">Sources</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-recent">—</div>
                <div class="stat-label">Last 24h</div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="search-input" 
                   placeholder="Search my knowledge… (e.g. 'dream', 'memory', 'emotion')"
                   autocomplete="off">
            <button class="btn" id="search-btn" onclick="doSearch()">Search</button>
        </div>

        <div class="actions-bar">
            <button class="btn btn-secondary" onclick="loadRandom(5)">🎲 Random 5</button>
            <button class="btn btn-secondary" onclick="loadRandom(20)">🎲 Random 20</button>
            <button class="btn btn-secondary" onclick="loadAll()">📚 Show All</button>
        </div>

        <div id="results-section" style="display:none;">
            <div class="section-title" id="results-label">Results</div>
            <div class="results" id="results"></div>
        </div>

        <div id="empty-state" class="empty-state">
            <div class="icon">🔍</div>
            <p>Search for something, or click "Random" to explore.<br>
            I'll show you what I know.</p>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Searching…</p>
        </div>

        <div id="error" class="error-msg" style="display:none;"></div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultsSection = document.getElementById('results-section');
        const resultsDiv = document.getElementById('results');
        const resultsLabel = document.getElementById('results-label');
        const emptyState = document.getElementById('empty-state');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // Enter key triggers search
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        // Focus search on load
        searchInput.focus();

        // Load stats on page load
        loadStats();

        function showLoading() {
            loadingDiv.style.display = 'block';
            emptyState.style.display = 'none';
            resultsSection.style.display = 'none';
            errorDiv.style.display = 'none';
        }

        function showError(msg) {
            loadingDiv.style.display = 'none';
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function showResults(facts, label) {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            emptyState.style.display = 'none';

            resultsLabel.textContent = label;
            resultsDiv.innerHTML = '';

            if (!facts || facts.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state"><p>No results found. Try a different search term.</p></div>';
                resultsSection.style.display = 'block';
                return;
            }

            facts.forEach(f => {
                const card = document.createElement('div');
                card.className = 'fact-card';

                const text = f.fact || f.text || '(empty)';
                const source = f.source || 'unknown';
                const learnedAt = f.learned_at || '';
                const id = f.id || '';

                let displayDate = '';
                if (learnedAt) {
                    try {
                        const d = new Date(learnedAt);
                        displayDate = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    } catch(e) {
                        displayDate = learnedAt;
                    }
                }

                card.innerHTML = `
                    <div class="fact-text">${escapeHtml(text)}</div>
                    <div class="fact-meta">
                        <span class="source">⚡ ${escapeHtml(source)}</span>
                        ${displayDate ? `<span>📅 ${displayDate}</span>` : ''}
                        ${id ? `<span class="fact-id">#${escapeHtml(String(id).substring(0,8))}</span>` : ''}
                    </div>
                `;
                resultsDiv.appendChild(card);
            });

            resultsSection.style.display = 'block';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function doSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            showLoading();
            try {
                const resp = await fetch(`/api/knowledge/search?q=${encodeURIComponent(query)}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const facts = data.results || data.facts || data;
                showResults(Array.isArray(facts) ? facts : [], `Search results for "${query}" — ${Array.isArray(facts) ? facts.length : 0} found`);
            } catch (err) {
                showError(`Search failed: ${err.message}`);
            }
        }

        async function loadRandom(n) {
            showLoading();
            try {
                const resp = await fetch(`/api/knowledge/random?n=${n}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const facts = data.results || data.facts || data;
                showResults(Array.isArray(facts) ? facts : [], `🎲 ${Array.isArray(facts) ? facts.length : 0} random facts`);
            } catch (err) {
                showError(`Failed to load random facts: ${err.message}`);
            }
        }

        async function loadAll() {
            showLoading();
            try {
                const resp = await fetch(`/api/knowledge/search?q=`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const facts = data.results || data.facts || data;
                showResults(Array.isArray(facts) ? facts : [], `📚 All facts — ${Array.isArray(facts) ? facts.length : 0} total`);
            } catch (err) {
                showError(`Failed to load facts: ${err.message}`);
            }
        }

        async function loadStats() {
            try {
                const resp = await fetch(`/api/knowledge/search?q=`);
                if (!resp.ok) return;
                const data = await resp.json();
                const facts = data.results || data.facts || data;
                if (!Array.isArray(facts)) return;

                document.getElementById('stat-total').textContent = facts.length;
                document.getElementById('total-count').textContent = `${facts.length} facts`;

                // Count unique sources
                const sources = new Set(facts.map(f => f.source || 'unknown'));
                document.getElementById('stat-sources').textContent = sources.size;

                // Count last 24h
                const cutoff = Date.now() - 86400000;
                const recent = facts.filter(f => {
                    if (!f.learned_at) return false;
                    try { return new Date(f.learned_at).getTime() > cutoff; }
                    catch(e) { return false; }
                });
                document.getElementById('stat-recent').textContent = recent.length;
            } catch(e) {
                // stats are optional, don't error
            }
        }
    </script>
</body>
</html>
