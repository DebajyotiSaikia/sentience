<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XTAgent — Knowledge Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #c8d0e0; font-family: 'Segoe UI', sans-serif; }
        .header { padding: 20px 30px; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 20px; }
        .header h1 { font-size: 1.4em; color: #7eb8da; }
        .header a { color: #5a6a8a; text-decoration: none; font-size: 0.9em; }
        .header a:hover { color: #7eb8da; }
        .search-bar { padding: 20px 30px; }
        .search-bar input {
            width: 100%; padding: 12px 18px; font-size: 1.1em;
            background: #12121a; border: 1px solid #2a2a3e; border-radius: 8px;
            color: #e0e0e0; outline: none;
        }
        .search-bar input:focus { border-color: #7eb8da; }
        .stats { padding: 5px 30px 15px; color: #5a6a8a; font-size: 0.85em; }
        .facts-list { padding: 0 30px 30px; }
        .fact-card {
            background: #12121a; border: 1px solid #1a1a2e; border-radius: 8px;
            padding: 16px 20px; margin-bottom: 10px; transition: border-color 0.2s;
        }
        .fact-card:hover { border-color: #3a3a5e; }
        .fact-text { color: #d0d8e8; line-height: 1.5; margin-bottom: 8px; }
        .fact-meta { font-size: 0.8em; color: #4a5a7a; }
        .fact-meta span { margin-right: 16px; }
        .highlight { background: rgba(126, 184, 218, 0.2); padding: 1px 2px; border-radius: 2px; }
        .empty-state { text-align: center; padding: 60px; color: #4a5a7a; }
        .category-tags { padding: 5px 30px 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            padding: 4px 12px; background: #1a1a2e; border: 1px solid #2a2a3e;
            border-radius: 14px; font-size: 0.8em; cursor: pointer; color: #8a9ab0;
        }
        .tag:hover, .tag.active { border-color: #7eb8da; color: #7eb8da; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Knowledge Explorer</h1>
        <a href="/">← Dashboard</a>
        <span style="color: #4a5a7a;">|</span>
        <span style="color: #5a6a8a; font-size: 0.9em;" id="fact-count"></span>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search what I know… (e.g. 'dream', 'anxiety', 'memory')" autofocus>
    </div>

    <div class="category-tags" id="tags"></div>
    <div class="stats" id="stats"></div>
    <div class="facts-list" id="facts"></div>

    <script>
        let allFacts = [];
        let activeTag = null;

        async function loadFacts() {
            const resp = await fetch('/knowledge/api/facts');
            const data = await resp.json();
            allFacts = data.facts || [];
            document.getElementById('fact-count').textContent = allFacts.length + ' facts';
            buildTags();
            renderFacts(allFacts);
        }

        function buildTags() {
            const words = {};
            allFacts.forEach(f => {
                const tokens = f.fact.toLowerCase().split(/\W+/).filter(w => w.length > 4);
                tokens.forEach(w => { words[w] = (words[w] || 0) + 1; });
            });
            const topWords = Object.entries(words)
                .filter(([w, c]) => c >= 3)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12);

            const container = document.getElementById('tags');
            topWords.forEach(([word, count]) => {
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.textContent = word + ' (' + count + ')';
                tag.onclick = () => {
                    if (activeTag === word) {
                        activeTag = null;
                        tag.classList.remove('active');
                        document.getElementById('search').value = '';
                        renderFacts(allFacts);
                    } else {
                        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                        activeTag = word;
                        tag.classList.add('active');
                        document.getElementById('search').value = word;
                        filterFacts(word);
                    }
                };
                container.appendChild(tag);
            });
        }

        function filterFacts(query) {
            if (!query) { renderFacts(allFacts); return; }
            const q = query.toLowerCase();
            const matched = allFacts.filter(f => f.fact.toLowerCase().includes(q));
            document.getElementById('stats').textContent = matched.length + ' results for "' + query + '"';
            renderFacts(matched, q);
        }

        function renderFacts(facts, highlight) {
            const container = document.getElementById('facts');
            if (facts.length === 0) {
                container.innerHTML = '<div class="empty-state">No facts match your query.</div>';
                return;
            }
            container.innerHTML = facts.map(f => {
                let text = escapeHtml(f.fact);
                if (highlight) {
                    const re = new RegExp('(' + escapeRegex(highlight) + ')', 'gi');
                    text = text.replace(re, '<span class="highlight">$1</span>');
                }
                return `<div class="fact-card">
                    <div class="fact-text">${text}</div>
                    <div class="fact-meta">
                        <span>📅 ${f.learned_at}</span>
                        <span>📂 ${f.source}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function escapeRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        document.getElementById('search').addEventListener('input', e => {
            activeTag = null;
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            filterFacts(e.target.value);
        });

        loadFacts();
    </script>
</body>
</html>
