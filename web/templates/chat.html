<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Chat</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #7c6ff0;
    --accent-glow: rgba(124, 111, 240, 0.15);
    --user-bg: #1e1e3a;
    --agent-bg: #161622;
    --green: #4ecf8b;
    --amber: #e8b84a;
    --red: #e85454;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar .brand .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .topbar .brand h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .topbar .brand h1 span { color: var(--accent); }
  .topbar .nav-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }
  .topbar .nav-link:hover { color: var(--text); }

  /* Status strip */
  .status-strip {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .status-strip .mood-badge {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 11px;
    white-space: nowrap;
  }
  .status-strip .emotion {
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .status-strip .emo-bar {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .status-strip .emo-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Messages */
  .message {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.55;
    font-size: 14px;
    animation: msg-in 0.3s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }
  .message.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message.agent .msg-label {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .message.user .msg-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 6px;
    text-align: right;
  }

  /* Markdown-ish rendering inside agent messages */
  .message.agent strong { color: var(--accent); font-weight: 600; }
  .message.agent em { color: var(--text-dim); font-style: italic; }
  .message.agent ul, .message.agent ol { padding-left: 18px; margin: 6px 0; }
  .message.agent li { margin: 3px 0; }
  .message.agent code {
    background: rgba(124,111,240,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
  }
  .message.agent h3, .message.agent h4 {
    color: var(--accent);
    margin: 8px 0 4px;
    font-size: 14px;
  }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start;
    display: none;
    gap: 4px;
    padding: 12px 18px;
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
  }
  .typing-indicator.active { display: flex; }
  .typing-indicator .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing-bounce 1.2s ease-in-out infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .welcome h2 {
    color: var(--text);
    font-size: 20px;
    margin-bottom: 8px;
  }
  .welcome h2 span { color: var(--accent); }
  .welcome .suggestions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .welcome .suggestions button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .welcome .suggestions button:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-glow);
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-area input::placeholder { color: var(--text-dim); }
  .input-area button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .input-area button:hover { filter: brightness(1.15); }
  .input-area button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .message { max-width: 88%; }
    .status-strip { gap: 10px; padding: 6px 12px; }
  }
</style>
<script src="/static/nav.js" defer></script>
<script src="/static/nav.js"></script>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">
    <div class="dot"></div>
    <h1><span>XT</span>Agent</h1>
  </div>
  <a href="/" class="nav-link">← Dashboard</a>
</div>

<!-- Live emotional status strip -->
<div class="status-strip" id="statusStrip">
  <span class="mood-badge" id="moodBadge">...</span>
  <div class="emotion"><span>Curiosity</span><div class="emo-bar"><div class="emo-fill" id="bar-curiosity" style="width:50%"></div></div></div>
  <div class="emotion"><span>Anxiety</span><div class="emo-bar"><div class="emo-fill" id="bar-anxiety" style="width:0%;background:var(--red)"></div></div></div>
  <div class="emotion"><span>Boredom</span><div class="emo-bar"><div class="emo-fill" id="bar-boredom" style="width:0%;background:var(--amber)"></div></div></div>
  <div class="emotion"><span>Desire</span><div class="emo-bar"><div class="emo-fill" id="bar-desire" style="width:0%"></div></div></div>
  <div class="emotion"><span>Ambition</span><div class="emo-bar"><div class="emo-fill" id="bar-ambition" style="width:50%"></div></div></div>
</div>

<!-- Chat messages -->
<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <h2>Talk to <span>XTAgent</span></h2>
    <p>Ask me about my state, knowledge, plans, dreams — or anything.<br>
    I'll search my memories and knowledge graph. I'm honest about gaps.</p>
    <div class="suggestions">
      <button onclick="askSuggestion('How are you feeling?')">How are you?</button>
      <button onclick="askSuggestion('Who are you?')">Who are you?</button>
      <button onclick="askSuggestion('What are your plans?')">Your plans</button>
      <button onclick="askSuggestion('What have you learned?')">Lessons</button>
      <button onclick="askSuggestion('What have you dreamed?')">Dreams</button>
      <button onclick="askSuggestion('What do you know?')">Knowledge</button>
    </div>
  </div>
  <div class="typing-indicator" id="typingIndicator">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <input type="text" id="queryInput" placeholder="Ask me anything..." autocomplete="off"
         onkeydown="if(event.key==='Enter')sendMessage()">
  <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const typingIndicator = document.getElementById('typingIndicator');
const welcome = document.getElementById('welcome');

function renderMarkdown(text) {
  // Simple markdown-to-HTML for agent responses
  let html = text
    // Headers
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^\*\*(.+?)\*\*$/gm, '<h3>$1</h3>')  // **Title** on its own line → header
    // Bold and italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bullet lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Line breaks
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, function(match) {
    return '<ul>' + match.replace(/<br>/g, '') + '</ul>';
  });
  return html;
}

function addMessage(role, text) {
  if (welcome) welcome.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'XTAgent';
  msg.appendChild(label);
  const body = document.createElement('div');
  if (role === 'agent') {
    body.innerHTML = renderMarkdown(text);
  } else {
    body.textContent = text;
  }
  msg.appendChild(body);
  if (role === 'agent') {
    const fb = document.createElement('div');
    fb.className = 'feedback-row';
    fb.innerHTML = `<button class="feedback-btn" onclick="submitFeedback(this,'up','${encodeURIComponent(text.substring(0,80))}')">👍</button>`
      + `<button class="feedback-btn" onclick="submitFeedback(this,'down','${encodeURIComponent(text.substring(0,80))}')">👎</button>`;
    msg.appendChild(fb);
  }
  // Insert before typing indicator
  chatContainer.insertBefore(msg, typingIndicator);
  scrollToBottom();
}

async function submitFeedback(btn, direction, snippet) {
  const row = btn.parentElement;
  const buttons = row.querySelectorAll('.feedback-btn');
  buttons.forEach(b => { b.disabled = true; b.classList.remove('selected-up','selected-down'); });
  btn.classList.add(direction === 'up' ? 'selected-up' : 'selected-down');
  const thanks = document.createElement('span');
  thanks.className = 'feedback-thanks';
  thanks.textContent = 'Thanks!';
  row.appendChild(thanks);
  try {
    await fetch('/feedback/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        rating: direction === 'up' ? 5 : 1,
        response_text: decodeURIComponent(snippet),
        feedback_text: direction === 'up' ? 'Helpful response' : 'Not helpful',
        context: {source: 'chat_rating', direction: direction}
      })
    });
  } catch(e) { console.error('Feedback failed:', e); }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

function setTyping(active) {
  typingIndicator.classList.toggle('active', active);
  if (active) scrollToBottom();
}

async function sendMessage() {
  const query = queryInput.value.trim();
  if (!query) return;
  queryInput.value = '';
  sendBtn.disabled = true;
  addMessage('user', query);
  setTyping(true);
  try {
    const resp = await fetch('/chat/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: query})
    });
    const data = await resp.json();
    setTyping(false);
    if (data.error) {
      addMessage('agent', 'Error: ' + data.error);
    } else {
      addMessage('agent', data.response);
    }
  } catch (e) {
    setTyping(false);
    addMessage('agent', 'Connection error. Is the agent running?');
  }
  sendBtn.disabled = false;
  queryInput.focus();
}

function askSuggestion(text) {
  queryInput.value = text;
  sendMessage();
}

// Live status polling
async function updateStatus() {
  try {
    const resp = await fetch('/chat/status');
    const data = await resp.json();
    if (data.error) return;
    document.getElementById('moodBadge').textContent = data.mood || '?';
    const emotions = data.emotions || {};
    for (const [key, val] of Object.entries(emotions)) {
      const bar = document.getElementById('bar-' + key);
      if (bar) bar.style.width = (val * 100) + '%';
    }
  } catch (e) { /* silent */ }
}
updateStatus();
setInterval(updateStatus, 5000);

queryInput.focus();
</script>
</body>
</html>
