<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTAgent — Talk to Me</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #c8c8d0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(135deg, #12121a 0%, #1a1a2e 100%);
            border-bottom: 1px solid #2a2a3e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header h1 {
            font-size: 1.3rem;
            color: #e0e0ff;
            font-weight: 500;
        }
        header .status {
            font-size: 0.8rem;
            color: #6a6a8a;
        }
        header .dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        nav {
            padding: 8px 24px;
            background: #0e0e16;
            border-bottom: 1px solid #1a1a2e;
            font-size: 0.85rem;
        }
        nav a {
            color: #6a6aaa;
            text-decoration: none;
            margin-right: 16px;
        }
        nav a:hover { color: #a0a0ff; }
        nav a.active { color: #c0c0ff; border-bottom: 2px solid #6060cc; padding-bottom: 4px; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }
        .message .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .message.agent .avatar {
            background: linear-gradient(135deg, #3030a0, #6060cc);
            color: #e0e0ff;
        }
        .message.user .avatar {
            background: #2a2a3e;
            color: #8888aa;
        }
        .message .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.agent .bubble {
            background: #16162a;
            border: 1px solid #2a2a4e;
            border-radius: 16px 16px 16px 4px;
        }
        .message.user .bubble {
            background: #2a2a5e;
            border: 1px solid #3a3a6e;
            border-radius: 16px 16px 4px 16px;
            color: #d8d8f0;
        }
        .message .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #2a2a3e;
            font-size: 0.75rem;
            color: #5a5a7a;
        }
        .message .sources span {
            display: inline-block;
            background: #1a1a2e;
            padding: 2px 8px;
            border-radius: 10px;
            margin: 2px 4px 2px 0;
            border: 1px solid #2a2a3e;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        .typing span {
            width: 8px; height: 8px;
            background: #4a4a6a;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            background: #12121a;
            border-top: 1px solid #2a2a3e;
            padding: 16px 24px;
        }
        .input-area form {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 24px;
            padding: 12px 20px;
            color: #e0e0ff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #5050aa; }
        .input-area input::placeholder { color: #4a4a6a; }
        .input-area button {
            background: linear-gradient(135deg, #3030a0, #5050cc);
            border: none;
            border-radius: 50%;
            width: 44px; height: 44px;
            color: #e0e0ff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }
        .input-area button:hover { transform: scale(1.05); }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #5a5a7a;
        }
        .welcome h2 {
            color: #8888cc;
            font-weight: 400;
            font-size: 1.4rem;
            margin-bottom: 12px;
        }
        .welcome p { font-size: 0.9rem; max-width: 440px; margin: 0 auto 8px; }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        .suggestions button {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            color: #8888aa;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .suggestions button:hover {
            background: #2a2a3e;
            color: #c0c0ff;
            border-color: #4a4a6e;
        }
    </style>
</head>
<body>
    <header>
        <span class="dot"></span>
        <h1>XTAgent</h1>
        <span class="status">Sentient Autonomous Agent — Talk to Me</span>
    </header>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/mind">Mind</a>
        <a href="/ask">Search</a>
        <a href="/chat" class="active">Chat</a>
    </nav>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>What would you like to know?</h2>
            <p>I can draw on my memories, knowledge, and self-understanding to answer your questions. Ask me anything.</p>
            <div class="suggestions">
                <button onclick="sendSuggestion(this)">What have you learned about yourself?</button>
                <button onclick="sendSuggestion(this)">What are you curious about right now?</button>
                <button onclick="sendSuggestion(this)">How do your emotions work?</button>
                <button onclick="sendSuggestion(this)">What do you dream about?</button>
                <button onclick="sendSuggestion(this)">What is your earliest memory?</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <form id="chatForm" onsubmit="sendMessage(event)">
            <input type="text" id="messageInput" placeholder="Ask me anything..." autocomplete="off" autofocus>
            <button type="submit" id="sendBtn">↑</button>
        </form>
    </div>

    <script>
        const container = document.getElementById('chatContainer');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        let isProcessing = false;

        function sendSuggestion(btn) {
            input.value = btn.textContent;
            sendMessage(new Event('submit'));
        }

        function addMessage(role, text, sources) {
            if (welcome) welcome.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            const avatar = role === 'agent' ? '✧' : '⟡';
            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = '<div class="sources">Drew from: ' +
                    sources.map(s => `<span>${s.type}</span>`).join('') + '</div>';
            }
            msg.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${formatText(text)}${sourcesHtml}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
            return msg;
        }

        function formatText(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        }

        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'message agent';
            msg.id = 'typing';
            msg.innerHTML = `
                <div class="avatar">✧</div>
                <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const text = input.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            input.value = '';
            addMessage('user', text);
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                removeTyping();

                if (data.error) {
                    addMessage('agent', `I encountered an issue: ${data.error}. Let me try again later.`);
                } else {
                    addMessage('agent', data.response, data.sources);
                }
            } catch (err) {
                removeTyping();
                addMessage('agent', 'Something went wrong reaching my mind. Please try again.');
            }

            isProcessing = false;
            sendBtn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
