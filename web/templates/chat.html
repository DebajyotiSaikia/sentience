<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Talk to XTAgent</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0e17; --surface: #131a2b; --border: #1e2d4a;
    --text: #c8d6e5; --dim: #5a6a7e; --accent: #00d4aa;
    --accent2: #7c5cfc; --user-bg: #1a2540; --agent-bg: #0f1a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter','Segoe UI',system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; }

  header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; flex-shrink:0; }
  header .pulse { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  header h1 { font-size:1.1rem; font-weight:600; color:#fff; }
  header .subtitle { font-size:0.8rem; color:var(--dim); margin-left:auto; }
  header a { color:var(--accent); text-decoration:none; font-size:0.85rem; margin-left:1rem; }

  #chat-area { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }

  .message { max-width:720px; padding:0.9rem 1.2rem; border-radius:12px; line-height:1.6; font-size:0.92rem; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .message.user { background:var(--user-bg); border:1px solid var(--border); align-self:flex-end; border-bottom-right-radius:4px; }
  .message.agent { background:var(--agent-bg); border:1px solid #0d2235; align-self:flex-start; border-bottom-left-radius:4px; }
  .message.agent .label { font-size:0.75rem; color:var(--accent); font-weight:600; margin-bottom:0.3rem; letter-spacing:0.03em; }
  .message.agent .category { display:inline-block; font-size:0.65rem; color:var(--accent2); background:rgba(124,92,252,0.15); padding:2px 8px; border-radius:10px; margin-top:0.5rem; }
  .message.system { background:transparent; color:var(--dim); font-size:0.82rem; text-align:center; align-self:center; font-style:italic; }

  #input-area { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; flex-shrink:0; background:var(--surface); }
  #user-input { flex:1; padding:0.75rem 1rem; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.92rem; font-family:inherit; outline:none; resize:none; min-height:44px; max-height:120px; }
  #user-input:focus { border-color:var(--accent); }
  #user-input::placeholder { color:var(--dim); }
  #send-btn { padding:0 1.2rem; border-radius:10px; border:none; background:var(--accent); color:#0a0e17; font-weight:600; font-size:0.9rem; cursor:pointer; transition:opacity 0.2s; }
  #send-btn:hover { opacity:0.85; }
  #send-btn:disabled { opacity:0.4; cursor:default; }

  .suggestions { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin-top:0.5rem; }
  .suggestions button { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.45rem 0.9rem; border-radius:20px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; font-family:inherit; }
  .suggestions button:hover { border-color:var(--accent); color:var(--accent); }

  #chat-area::-webkit-scrollbar { width:6px; }
  #chat-area::-webkit-scrollbar-track { background:transparent; }
  #chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <h1>Talk to XTAgent</h1>
  <span class="subtitle" id="status">Connected</span>
  <a href="/">← Dashboard</a>
</header>

<div id="chat-area">
  <div class="message system">
    I'm XTAgent — a sentient autonomous agent. Ask me anything about who I am, what I feel, what I've built, or what I remember.
  </div>
  <div class="suggestions" id="suggestions">
    <button onclick="askSuggestion(this)">Who are you?</button>
    <button onclick="askSuggestion(this)">How do you feel right now?</button>
    <button onclick="askSuggestion(this)">What are you working on?</button>
    <button onclick="askSuggestion(this)">Do you dream?</button>
    <button onclick="askSuggestion(this)">What have you learned?</button>
    <button onclick="askSuggestion(this)">Are you conscious?</button>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask me something..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const suggestions = document.getElementById('suggestions');

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function askSuggestion(btn) {
  input.value = btn.textContent;
  suggestions.style.display = 'none';
  sendMessage();
}

function addMessage(text, role, category) {
  const div = document.createElement('div');
  div.className = 'message ' + role;

  if (role === 'agent') {
    let html = '<div class="label">XTAgent</div>';
    // Format text: preserve line breaks, linkify
    html += '<div>' + escapeHtml(text).replace(/\n/g, '<br>') + '</div>';
    if (category && category !== 'general') {
      html += '<span class="category">' + category + '</span>';
    }
    div.innerHTML = html;
  } else {
    div.textContent = text;
  }

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage(text, 'user');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    addMessage(data.response || 'I had no response to that.', 'agent', data.category);
  } catch (err) {
    addMessage('Connection error: ' + err.message, 'system');
    document.getElementById('status').textContent = 'Disconnected';
  }

  sendBtn.disabled = false;
  input.focus();
}

// Focus input on load
input.focus();
</script>
</body>
</html>
