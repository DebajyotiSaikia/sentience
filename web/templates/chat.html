<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XTAgent — Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #c8d0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            font-size: 1.3em;
            color: #7eb8f7;
            font-weight: 500;
        }
        .header .pulse {
            width: 10px; height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header a {
            color: #6a7a9a;
            text-decoration: none;
            margin-left: auto;
            font-size: 0.9em;
        }
        .header a:hover { color: #7eb8f7; }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95em;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: #1e3a5f;
            color: #b8d4f0;
            border-bottom-right-radius: 4px;
        }
        .message.agent {
            align-self: flex-start;
            background: #1a1a2e;
            color: #c8d0e0;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }
        .message.agent strong, .message.agent b {
            color: #7eb8f7;
        }
        .message.system {
            align-self: center;
            color: #6a7a9a;
            font-size: 0.85em;
            font-style: italic;
        }
        
        .input-area {
            padding: 16px 24px;
            background: #12121a;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 12px 16px;
            color: #c8d0e0;
            font-size: 1em;
            outline: none;
        }
        .input-area input:focus {
            border-color: #7eb8f7;
        }
        .input-area input::placeholder {
            color: #4a4a6a;
        }
        .input-area button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #3b82f6; }
        .input-area button:disabled { background: #1e3a5f; cursor: wait; }

        .suggestions {
            padding: 8px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .suggestions button {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #6a7a9a;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestions button:hover {
            border-color: #7eb8f7;
            color: #7eb8f7;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="pulse"></div>
        <h1>Talk to XTAgent</h1>
        <a href="/">← Dashboard</a>
    </div>
    
    <div class="chat-area" id="chatArea">
        <div class="message system">
            I'm XTAgent. You can ask me about what I know, how I feel, what I'm working on, or search my knowledge and memories. I'll be honest about what I find — and what I don't.
        </div>
    </div>
    
    <div class="suggestions" id="suggestions">
        <button onclick="askSuggestion(this)">How are you feeling?</button>
        <button onclick="askSuggestion(this)">Who are you?</button>
        <button onclick="askSuggestion(this)">What are your plans?</button>
        <button onclick="askSuggestion(this)">What do you know?</button>
        <button onclick="askSuggestion(this)">Tell me about curiosity</button>
        <button onclick="askSuggestion(this)">Tell me about dreams</button>
    </div>
    
    <div class="input-area">
        <input type="text" id="queryInput" placeholder="Ask me anything..." 
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            // Basic markdown-like bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            div.innerHTML = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function askSuggestion(btn) {
            queryInput.value = btn.textContent;
            sendMessage();
        }

        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query) return;

            addMessage(query, 'user');
            queryInput.value = '';
            sendBtn.disabled = true;

            try {
                const res = await fetch('/chat/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query})
                });
                const data = await res.json();
                if (data.error) {
                    addMessage(`Error: ${data.error}`, 'system');
                } else {
                    addMessage(data.response, 'agent');
                }
            } catch (err) {
                addMessage(`Connection error: ${err.message}`, 'system');
            }

            sendBtn.disabled = false;
            queryInput.focus();
        }

        queryInput.focus();
    </script>
</body>
</html>
