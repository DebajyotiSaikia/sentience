<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTAgent — Knowledge Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #c0c0d0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            color: #7b68ee;
            font-size: 1.5em;
        }
        .header a {
            color: #888;
            text-decoration: none;
            font-size: 0.9em;
        }
        .header a:hover { color: #7b68ee; }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            background: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0f0;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus {
            border-color: #7b68ee;
        }
        .search-box button {
            padding: 12px 24px;
            background: #7b68ee;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: #6a5acd; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 15px 20px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2em;
            color: #7b68ee;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 0.8em;
            color: #888;
            margin-top: 4px;
        }
        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .result-card {
            background: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 16px 20px;
            transition: border-color 0.2s;
        }
        .result-card:hover {
            border-color: #7b68ee;
        }
        .result-card .fact {
            color: #e0e0f0;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .result-card .meta {
            font-size: 0.75em;
            color: #666;
        }
        .result-card .meta span {
            margin-right: 15px;
        }
        .category-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 6px 14px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            color: #888;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn:hover, .cat-btn.active {
            border-color: #7b68ee;
            color: #7b68ee;
            background: #1a1a3e;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 15px; }
        .loading { text-align: center; padding: 30px; color: #666; }
        .highlight { background: rgba(123, 104, 238, 0.2); padding: 1px 3px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Knowledge Explorer</h1>
        <a href="/">← Dashboard</a>
    </div>
    <div class="container">
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="value" id="total-facts">—</div>
                <div class="label">Total Facts</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total-lessons">—</div>
                <div class="label">Lessons</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total-insights">—</div>
                <div class="label">Dream Insights</div>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="query" placeholder="Search my knowledge… (e.g. 'curiosity', 'dream', 'lesson')" autofocus>
            <button onclick="search()">Search</button>
        </div>
        <div class="category-filters" id="filters"></div>
        <div class="results" id="results">
            <div class="empty-state">
                <div class="icon">🔍</div>
                <p>Type a query above to explore what I know</p>
                <p style="margin-top: 8px; font-size: 0.85em;">Or press Enter to see all facts</p>
            </div>
        </div>
    </div>
    <script>
        const queryInput = document.getElementById('query');
        queryInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') search();
        });

        async function loadStats() {
            try {
                const resp = await fetch('/knowledge/api/stats');
                const data = await resp.json();
                document.getElementById('total-facts').textContent = data.total || 0;
                document.getElementById('total-lessons').textContent = data.lessons || 0;
                document.getElementById('total-insights').textContent = data.insights || 0;
            } catch(e) {
                console.error('Stats load failed:', e);
            }
        }

        async function search() {
            const q = queryInput.value.trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Searching…</div>';
            try {
                const url = q ? `/knowledge/api/search?q=${encodeURIComponent(q)}` : '/knowledge/api/search';
                const resp = await fetch(url);
                const data = await resp.json();
                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🤔</div>
                            <p>No facts match "${q || 'everything'}"</p>
                        </div>`;
                    return;
                }
                resultsDiv.innerHTML = data.results.map(fact => {
                    let text = fact.fact || fact.text || String(fact);
                    if (q) {
                        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                        text = text.replace(re, '<span class="highlight">$1</span>');
                    }
                    const source = fact.source || '';
                    const learned = fact.learned_at ? new Date(fact.learned_at).toLocaleDateString() : '';
                    return `<div class="result-card">
                        <div class="fact">${text}</div>
                        <div class="meta">
                            ${source ? `<span>📁 ${source}</span>` : ''}
                            ${learned ? `<span>📅 ${learned}</span>` : ''}
                        </div>
                    </div>`;
                }).join('');
            } catch(e) {
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;
            }
        }

        loadStats();
    </script>
</body>
</html>
