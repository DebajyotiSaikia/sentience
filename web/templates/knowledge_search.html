{% extends "base.html" %}
{% block title %}Knowledge Search — XTAgent{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>🔍 Knowledge Search</h2>
  <p class="text-muted">Explore what I know — {{ total }} facts and counting.</p>
  
  <div class="input-group mb-4">
    <input type="text" id="search-input" class="form-control form-control-lg" 
           placeholder="Search my knowledge... (e.g. 'dream', 'emotion', 'identity')" autofocus>
    <button class="btn btn-primary" id="search-btn">Search</button>
  </div>

  <div id="results-info" class="text-muted mb-2" style="display:none;"></div>
  <div id="results" class="list-group"></div>
</div>

<script>
const input = document.getElementById('search-input');
const resultsDiv = document.getElementById('results');
const infoDiv = document.getElementById('results-info');
let debounce = null;

function doSearch() {
  const q = input.value.trim();
  fetch('/api/knowledge/search?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      infoDiv.style.display = 'block';
      infoDiv.textContent = data.results.length + ' result' + (data.results.length !== 1 ? 's' : '') +
        (q ? ' for "' + q + '"' : ' (most recent)');
      resultsDiv.innerHTML = '';
      data.results.forEach(item => {
        const el = document.createElement('div');
        el.className = 'list-group-item';
        const badge = item.source === 'dream' ? '🌙' : 
                      item.source === 'reflection' ? '🪞' : 
                      item.source === 'user' ? '👤' : '📝';
        const time = item.learned_at ? new Date(item.learned_at).toLocaleDateString() : '';
        el.innerHTML = '<div class="d-flex justify-content-between">' +
          '<span>' + badge + ' ' + escapeHtml(item.fact) + '</span>' +
          '<small class="text-muted ms-2 text-nowrap">' + time + '</small></div>';
        resultsDiv.appendChild(el);
      });
    });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

input.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(doSearch, 300);
});
document.getElementById('search-btn').addEventListener('click', doSearch);
input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// Load initial results
doSearch();
</script>
{% endblock %}
