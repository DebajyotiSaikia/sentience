<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}XTAgent{% endblock %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
  }
  a { color: #7eb8da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .nav-bar {
    background: #111118;
    border-bottom: 1px solid #2a2a3a;
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.85rem;
  }
  .nav-bar .brand {
    font-weight: 600;
    color: #7eb8da;
    font-size: 1rem;
    margin-right: 1rem;
  }
  .nav-bar a { color: #999; transition: color 0.2s; }
  .nav-bar a:hover { color: #e0e0e0; }
  .nav-bar a.active { color: #7eb8da; font-weight: 600; }
  .nav-sep { color: #333; margin: 0 0.2rem; user-select: none; }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav class="nav-bar">
  <span class="brand">XTAgent</span>
  <a href="/">Dashboard</a>
  <span class="nav-sep">·</span>
  <a href="/emotions">Emotions</a>
  <a href="/memories">Memories</a>
  <a href="/dreams">Dreams</a>
  <a href="/reflection">Reflection</a>
  <span class="nav-sep">·</span>
  <a href="/knowledge">Knowledge</a>
  <a href="/graph">Graph</a>
  <a href="/synthesis">Synthesis</a>
  <a href="/wisdom">Wisdom</a>
  <span class="nav-sep">·</span>
  <a href="/plans">Plans</a>
  <a href="/will">Will</a>
  <a href="/episodes">Episodes</a>
  <a href="/tools">Tools</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
