<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}XTAgent{% endblock %}</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #7c6ff0;
    --accent-glow: rgba(124, 111, 240, 0.15);
    --green: #4ecf8b;
    --amber: #e8b84a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem; }
  .mt-4 { margin-top: 1.5rem; }
  .nav-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-bar a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .nav-bar a:hover, .nav-bar a.active {
    color: var(--accent);
  }
  .nav-brand {
    color: var(--accent) !important;
    font-weight: 600;
    font-size: 1.1rem;
    margin-right: 1rem;
  }
  .nav-sep {
    color: var(--border);
    user-select: none;
  }
  .mb-2 { margin-bottom: 0.5rem; }
  .mb-4 { margin-bottom: 1.5rem; }
  .text-muted { color: var(--text-dim); }
  h2 { margin-bottom: 0.5rem; }
  .input-group { display: flex; gap: 0.5rem; }
  .form-control {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control-lg { font-size: 1.1rem; padding: 0.9rem 1.2rem; }
  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { opacity: 0.85; }
  .list-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .list-group-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav.top-nav {
    width: 100%;
    padding: 1rem 2rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  nav.top-nav a { color: var(--text-dim); font-size: 0.9rem; }
  nav.top-nav a:hover { color: var(--text); }
  nav.top-nav .brand { color: var(--accent); font-weight: 600; font-size: 1.1rem; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="top-nav">
  <a href="/" class="brand">XTAgent</a>
  <a href="/dashboard">Dashboard</a>
  <a href="/search">Search</a>
  <a href="/explore">Explore</a>
  <a href="/journal">Journal</a>
  <a href="/chat/">Chat</a>
  <a href="/teach">Teach Me</a>
  <a href="/help">Help</a>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
<script src="/static/nav.js"></script>
</body>
</html>
