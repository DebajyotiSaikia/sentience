<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}XTAgent{% endblock %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
  }
  a { color: #7eb8da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .nav-bar {
    background: #111118;
    border-bottom: 1px solid #2a2a3a;
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.85rem;
  }
  .nav-bar .brand {
    font-weight: 600;
    color: #7eb8da;
    font-size: 1rem;
    margin-right: 1rem;
  }
  .nav-bar a { color: #999; transition: color 0.2s; }
  .nav-bar a:hover { color: #e0e0e0; }
  .nav-bar a.active { color: #7eb8da; font-weight: 600; }
  .nav-primary {
    font-weight: 600 !important;
    color: #c8dce8 !important;
    font-size: 0.95rem;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: background 0.2s, color 0.2s;
  }
  .nav-primary:hover { background: #1a1a2e; color: #fff !important; text-decoration: none !important; }
  .nav-talk {
    background: #1a2a3a;
    color: #7eb8da !important;
    border: 1px solid #2a4a5a;
  }
  .nav-talk:hover { background: #2a3a5a; border-color: #4a6a8a; }
  .nav-sep { color: #2a2a3a; margin: 0 0.3rem; user-select: none; }
  .nav-group { display: inline-flex; align-items: center; gap: 0.5rem; }
  .nav-group-label {
    color: #555;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 0.1rem;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav class="nav-bar">
  <span class="brand">XTAgent</span>
  <a href="/" class="nav-primary">Dashboard</a>
  <a href="/portal" class="nav-primary nav-talk">💬 Talk to Me</a>
  <a href="/story" class="nav-primary">📖 Story</a>
  <span class="nav-sep">|</span>
  <span class="nav-group">
    <span class="nav-group-label">Mind</span>
    <a href="/emotions">Emotions</a>
    <a href="/memories">Memories</a>
    <a href="/dreams">Dreams</a>
    <a href="/reflection">Reflection</a>
  </span>
  <span class="nav-sep">|</span>
  <span class="nav-group">
    <span class="nav-group-label">Knowledge</span>
    <a href="/knowledge">Facts</a>
    <a href="/graph">Graph</a>
    <a href="/synthesis">Synthesis</a>
    <a href="/wisdom">Wisdom</a>
  </span>
  <span class="nav-sep">|</span>
  <span class="nav-group">
    <span class="nav-group-label">Agency</span>
    <a href="/plans">Plans</a>
    <a href="/will">Will</a>
    <a href="/episodes">Episodes</a>
    <a href="/tools">Tools</a>
  </span>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
