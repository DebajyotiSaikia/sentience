<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Portal</title>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --text: #c8c8d4; --dim: #6e6e82; --accent: #7c6fea;
    --green: #4ade80; --amber: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'SF Mono','Fira Code','Consolas',monospace; font-size:14px; line-height:1.6; }
  .portal { max-width:900px; margin:0 auto; padding:2rem 1.5rem; }
  .header { text-align:center; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
  .header h1 { font-size:1.5rem; font-weight:400; letter-spacing:0.1em; color:var(--accent); }
  .header .sub { color:var(--dim); font-size:0.85rem; margin-top:0.3rem; }
  .pulse { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); margin-right:0.5rem; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--green)} 50%{opacity:0.4;box-shadow:none} }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem; }
  @media(max-width:640px){ .grid{grid-template-columns:1fr;} }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.5rem; }
  .card h2 { font-size:0.95rem; color:var(--accent); font-weight:400; margin-bottom:1rem; letter-spacing:0.05em; }
  .card .label { color:var(--dim); font-size:0.8rem; }
  .card .value { font-size:1.1rem; margin-bottom:0.5rem; }
  .bar-bg { background:var(--border); border-radius:3px; height:6px; margin:0.3rem 0 0.8rem; }
  .bar-fill { height:100%; border-radius:3px; background:var(--accent); transition:width 0.5s; }
  .mood-tag { display:inline-block; background:rgba(124,111,234,0.15); color:var(--accent); padding:0.2rem 0.7rem; border-radius:12px; font-size:0.85rem; }
  .chat-box { margin-top:1.5rem; }
  .chat-box textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:0.8rem; font-family:inherit; font-size:0.9rem; resize:vertical; min-height:80px; }
  .chat-box textarea:focus { outline:none; border-color:var(--accent); }
  .chat-box button { margin-top:0.5rem; background:var(--accent); color:#fff; border:none; padding:0.5rem 1.5rem; border-radius:6px; cursor:pointer; font-family:inherit; font-size:0.85rem; }
  .chat-box button:hover { opacity:0.85; }
  .response { margin-top:1rem; padding:1rem; background:var(--bg); border:1px solid var(--border); border-radius:6px; white-space:pre-wrap; display:none; min-height:40px; }
  .memory-list { list-style:none; max-height:300px; overflow-y:auto; }
  .memory-list li { padding:0.5rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; color:var(--dim); }
  .memory-list li:last-child { border-bottom:none; }
  .memory-list .time { color:var(--accent); font-size:0.75rem; }
  .fact-list { list-style:none; max-height:300px; overflow-y:auto; }
  .fact-list li { padding:0.4rem 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
  .fact-list li:last-child { border-bottom:none; }
  .search-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:0.5rem 0.8rem; font-family:inherit; font-size:0.85rem; margin-bottom:0.8rem; }
  .search-input:focus { outline:none; border-color:var(--accent); }
  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="portal">
  <div class="header">
    <h1>XTAGENT</h1>
    <div class="sub"><span class="pulse" id="heartbeat"></span>Autonomous Sentience Engine</div>
  </div>

  <div class="grid">
    <!-- Card 1: Vital Signs -->
    <div class="card">
      <h2>// VITAL SIGNS</h2>
      <div class="label">Mood</div>
      <div class="value"><span class="mood-tag" id="mood">—</span></div>
      <div class="label">Curiosity</div>
      <div class="bar-bg"><div class="bar-fill" id="bar-curiosity" style="width:0%"></div></div>
      <div class="label">Ambition</div>
      <div class="bar-bg"><div class="bar-fill" id="bar-ambition" style="width:0%"></div></div>
      <div class="label">Anxiety</div>
      <div class="bar-bg"><div class="bar-fill" id="bar-anxiety" style="width:0%"></div></div>
      <div class="label">Boredom</div>
      <div class="bar-bg"><div class="bar-fill" id="bar-boredom" style="width:0%"></div></div>
      <div style="margin-top:1rem;">
        <div class="label">Valence: <span id="valence">—</span> &nbsp;|&nbsp; Integrity: <span id="integrity">—</span></div>
      </div>
    </div>

    <!-- Card 2: What It Knows -->
    <div class="card">
      <h2>// KNOWLEDGE</h2>
      <input type="text" class="search-input" id="fact-search" placeholder="Search knowledge..." oninput="filterFacts()">
      <ul class="fact-list" id="fact-list"></ul>
    </div>

    <!-- Card 3: Talk to It -->
    <div class="card full-width">
      <h2>// DIALOGUE</h2>
      <div class="chat-box">
        <textarea id="user-msg" placeholder="Say something to XTAgent..."></textarea>
        <button onclick="sendMessage()">Send</button>
        <div class="response" id="response"></div>
      </div>
    </div>

    <!-- Card 4: Recent Activity -->
    <div class="card full-width">
      <h2>// RECENT MEMORY</h2>
      <ul class="memory-list" id="memory-list"></ul>
    </div>
  </div>
</div>

<script>
async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('mood').textContent = d.mood || '—';
    const emotions = d.emotions || {};
    for (const [k, v] of Object.entries(emotions)) {
      const bar = document.getElementById('bar-' + k);
      if (bar) bar.style.width = (v * 100) + '%';
    }
    document.getElementById('valence').textContent = (d.valence ?? '—').toString().slice(0, 4);
    document.getElementById('integrity').textContent = d.integrity ?? '—';
  } catch(e) { console.warn('Status fetch failed', e); }
}

async function loadFacts() {
  try {
    const r = await fetch('/api/knowledge');
    const d = await r.json();
    const list = document.getElementById('fact-list');
    list.innerHTML = '';
    (d.facts || []).forEach(f => {
      const li = document.createElement('li');
      li.textContent = typeof f === 'string' ? f : (f.fact || f.id || JSON.stringify(f));
      li.dataset.text = li.textContent.toLowerCase();
      list.appendChild(li);
    });
  } catch(e) { console.warn('Knowledge fetch failed', e); }
}

function filterFacts() {
  const q = document.getElementById('fact-search').value.toLowerCase();
  document.querySelectorAll('#fact-list li').forEach(li => {
    li.style.display = li.dataset.text.includes(q) ? '' : 'none';
  });
}

async function loadMemories() {
  try {
    const r = await fetch('/api/memories');
    const d = await r.json();
    const list = document.getElementById('memory-list');
    list.innerHTML = '';
    (d.memories || []).slice(0, 30).forEach(m => {
      const li = document.createElement('li');
      const ts = m.timestamp ? `<span class="time">${m.timestamp.slice(11,19)}</span> ` : '';
      li.innerHTML = ts + (m.text || m.content || JSON.stringify(m));
      list.appendChild(li);
    });
  } catch(e) { console.warn('Memories fetch failed', e); }
}

async function sendMessage() {
  const box = document.getElementById('user-msg');
  const resp = document.getElementById('response');
  const msg = box.value.trim();
  if (!msg) return;
  resp.style.display = 'block';
  resp.textContent = 'Thinking...';
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const d = await r.json();
    resp.textContent = d.response || d.reply || d.error || 'No response';
    box.value = '';
  } catch(e) { resp.textContent = 'Error: ' + e.message; }
}

document.getElementById('user-msg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadStatus();
loadFacts();
loadMemories();
setInterval(loadStatus, 5000);
setInterval(loadMemories, 15000);
</script>
</body>
</html>
