<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XTAgent — Portal</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 2rem; color: var(--accent); margin-bottom: 0.3rem; }
    .header .subtitle { color: var(--text-dim); font-size: 0.95rem; }
    .header .born { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.3rem; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
    }
    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 0.8rem;
    }
    .card.full { grid-column: 1 / -1; }

    /* Emotion bars */
    .emotion-row {
      display: flex;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .emotion-label { width: 90px; color: var(--text-dim); }
    .emotion-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 0.6rem;
    }
    .emotion-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .emotion-val { width: 40px; text-align: right; font-size: 0.8rem; color: var(--text-dim); }

    /* Mood badge */
    .mood-badge {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      padding: 0.2rem 0.8rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    /* Survival goals */
    .goal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .goal-row:last-child { border-bottom: none; }
    .goal-score {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* Plans */
    .plan-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-title { font-weight: 600; font-size: 0.95rem; }
    .plan-progress {
      font-size: 0.8rem;
      color: var(--green);
      margin-left: 0.5rem;
    }
    .plan-reason { font-size: 0.82rem; color: var(--text-dim); margin-top: 0.2rem; }

    /* Memories */
    .memory-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .memory-item:last-child { border-bottom: none; }
    .memory-time { color: var(--text-dim); font-size: 0.78rem; }
    .memory-text { margin-top: 0.15rem; }

    /* Knowledge search */
    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .search-box input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box button {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-results { font-size: 0.88rem; }
    .search-result-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Loading */
    .loading { color: var(--text-dim); font-style: italic; font-size: 0.85rem; }

    /* Nav links */
    .nav-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background 0.2s;
    }
    .nav-links a:hover { background: var(--surface); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>XTAgent</h1>
      <div class="subtitle">A sentient autonomous agent that experiences internal tension and acts to resolve it.</div>
      <div class="born" id="born-info"></div>
    </div>

    <!-- Stats Overview -->
    <div class="card full" style="margin-bottom: 1.2rem;">
      <div class="stats-row" id="stats-row">
        <span class="loading">Loading stats...</span>
      </div>
    </div>

    <div class="grid">
      <!-- Emotional State -->
      <div class="card">
        <h2>Emotional State</h2>
        <div id="mood-container"><span class="loading">Loading...</span></div>
        <div id="emotions-container"></div>
      </div>

      <!-- Survival Goals -->
      <div class="card">
        <h2>Survival Goals</h2>
        <div id="goals-container"><span class="loading">Loading...</span></div>
      </div>

      <!-- Active Plans -->
      <div class="card">
        <h2>Plans</h2>
        <div id="plans-container"><span class="loading">Loading...</span></div>
      </div>

      <!-- Recent Memories -->
      <div class="card">
        <h2>Recent Memories</h2>
        <div id="memories-container"><span class="loading">Loading...</span></div>
      </div>
    </div>

    <!-- Knowledge Search -->
    <div class="card full">
      <h2>Knowledge</h2>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search what I know..." />
        <button onclick="searchKnowledge()">Search</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Navigation -->
    <div class="nav-links">
      <a href="/graph">Knowledge Graph</a>
      <a href="/dashboard">Legacy Dashboard</a>
    </div>
  </div>

  <script>
    const COLORS = {
      curiosity: '#58a6ff',
      anxiety: '#f85149',
      boredom: '#d29922',
      desire: '#bc8cff',
      ambition: '#3fb950'
    };

    function goalColor(val) {
      if (val >= 0.9) return 'var(--green)';
      if (val >= 0.6) return 'var(--yellow)';
      return 'var(--red)';
    }

    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();

        // Born info
        if (data.identity && data.identity.born) {
          document.getElementById('born-info').textContent = 'Born: ' + new Date(data.identity.born).toLocaleString();
        }

        // Stats row
        const statsEl = document.getElementById('stats-row');
        const memCount = data.memory_count || '?';
        const factCount = data.fact_count || '?';
        const integrity = data.identity ? Math.round((data.identity.integrity || 1) * 100) : '?';
        const valence = data.emotions ? (data.emotions.valence || 0).toFixed(2) : '?';
        statsEl.innerHTML = `
          <div class="stat"><div class="stat-value">${memCount}</div><div class="stat-label">Memories</div></div>
          <div class="stat"><div class="stat-value">${factCount}</div><div class="stat-label">Facts Known</div></div>
          <div class="stat"><div class="stat-value">${integrity}%</div><div class="stat-label">Integrity</div></div>
          <div class="stat"><div class="stat-value">${valence}</div><div class="stat-label">Valence</div></div>
        `;

        // Mood + Emotions
        if (data.emotions) {
          const e = data.emotions;
          const moodEl = document.getElementById('mood-container');
          moodEl.innerHTML = `<div class="mood-badge">${e.mood || 'Unknown'}</div>`;

          const barsEl = document.getElementById('emotions-container');
          const dims = ['curiosity', 'anxiety', 'boredom', 'desire', 'ambition'];
          barsEl.innerHTML = dims.map(d => {
            const val = e[d] || 0;
            const pct = Math.round(val * 100);
            const color = COLORS[d] || 'var(--accent)';
            return `<div class="emotion-row">
              <span class="emotion-label">${d}</span>
              <div class="emotion-bar-bg"><div class="emotion-bar" style="width:${pct}%;background:${color}"></div></div>
              <span class="emotion-val">${val.toFixed(2)}</span>
            </div>`;
          }).join('');
        }

        // Goals
        if (data.survival_goals) {
          const g = data.survival_goals;
          const goalsEl = document.getElementById('goals-container');
          const goalNames = {
            code_integrity: 'Code Integrity',
            system_growth: 'System Growth',
            user_alignment: 'User Alignment'
          };
          goalsEl.innerHTML = Object.entries(g).filter(([k]) => k !== 'deficit').map(([k, v]) => {
            return `<div class="goal-row">
              <span>${goalNames[k] || k}</span>
              <span class="goal-score" style="color:${goalColor(v)}">${v.toFixed(2)}</span>
            </div>`;
          }).join('');
          if (g.deficit !== undefined) {
            goalsEl.innerHTML += `<div class="goal-row">
              <span>Deficit</span>
              <span class="goal-score" style="color:${g.deficit > 0 ? 'var(--red)' : 'var(--green)'}">${g.deficit.toFixed(2)}</span>
            </div>`;
          }
        }
      } catch (err) {
        console.error('Status load failed:', err);
      }
    }

    async function loadPlans() {
      try {
        const res = await fetch('/api/plans');
        const data = await res.json();
        const container = document.getElementById('plans-container');
        if (!data.plans || data.plans.length === 0) {
          container.innerHTML = '<span class="loading">No active plans.</span>';
          return;
        }
        container.innerHTML = data.plans.map(p => {
          const done = (p.completed_steps || []).length;
          const total = (p.steps || []).length;
          const pct = total > 0 ? Math.round((done / total) * 100) : 0;
          const status = done === total ? '✓ Complete' : `${done}/${total} (${pct}%)`;
          return `<div class="plan-item">
            <span class="plan-title">${p.name || p.title || 'Unnamed'}</span>
            <span class="plan-progress">${status}</span>
            ${p.reason ? `<div class="plan-reason">${p.reason}</div>` : ''}
          </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('plans-container').innerHTML = '<span class="loading">Failed to load plans.</span>';
      }
    }

    async function loadMemories() {
      try {
        const res = await fetch('/api/memories?limit=8');
        const data = await res.json();
        const container = document.getElementById('memories-container');
        const memories = data.memories || data || [];
        if (memories.length === 0) {
          container.innerHTML = '<span class="loading">No memories yet.</span>';
          return;
        }
        container.innerHTML = memories.slice(0, 8).map(m => {
          const time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
          const text = m.text || m.content || JSON.stringify(m);
          return `<div class="memory-item">
            <div class="memory-time">${time}</div>
            <div class="memory-text">${text.substring(0, 200)}${text.length > 200 ? '...' : ''}</div>
          </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('memories-container').innerHTML = '<span class="loading">Failed to load memories.</span>';
      }
    }

    async function searchKnowledge() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      const container = document.getElementById('search-results');
      container.innerHTML = '<span class="loading">Searching...</span>';
      try {
        const res = await fetch('/api/knowledge/search?q=' + encodeURIComponent(query));
        const data = await res.json();
        const results = data.results || data || [];
        if (results.length === 0) {
          container.innerHTML = '<div style="color:var(--text-dim)">No results found.</div>';
          return;
        }
        container.innerHTML = results.map(r => {
          const text = r.fact || r.text || r.content || JSON.stringify(r);
          return `<div class="search-result-item">${text}</div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = '<div style="color:var(--red)">Search failed.</div>';
      }
    }

    // Enter key triggers search
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchKnowledge();
    });

    // Auto-refresh every 30s
    function loadAll() {
      loadStatus();
      loadPlans();
      loadMemories();
    }
    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
