<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTAgent — Knowledge Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17; color: #c8d6e5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0f1923 0%, #1a2332 100%);
            border-bottom: 1px solid #1e3a5f;
            padding: 1.5rem 2rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .header h1 { font-size: 1.4rem; color: #4fc3f7; }
        .header a { color: #5e81ac; text-decoration: none; font-size: 0.9rem; }
        .header a:hover { color: #88c0d0; }
        .stats-bar {
            display: flex; gap: 2rem; padding: 1rem 2rem;
            background: #0d1320; border-bottom: 1px solid #1a2744;
        }
        .stat { text-align: center; }
        .stat .value { font-size: 1.6rem; font-weight: bold; color: #4fc3f7; }
        .stat .label { font-size: 0.75rem; color: #5e81ac; text-transform: uppercase; }
        .search-container {
            max-width: 800px; margin: 2rem auto; padding: 0 2rem;
        }
        .search-box {
            display: flex; gap: 0.5rem;
        }
        .search-box input {
            flex: 1; padding: 0.8rem 1.2rem;
            background: #111927; border: 1px solid #1e3a5f;
            border-radius: 8px; color: #e0e0e0;
            font-size: 1rem; outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #4fc3f7; }
        .search-box button {
            padding: 0.8rem 1.5rem; background: #1e3a5f;
            border: none; border-radius: 8px; color: #4fc3f7;
            font-size: 1rem; cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: #264a6f; }
        .results { margin-top: 1.5rem; }
        .result-count { color: #5e81ac; font-size: 0.85rem; margin-bottom: 1rem; }
        .fact-card {
            background: #111927; border: 1px solid #1a2744;
            border-radius: 8px; padding: 1rem 1.2rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .fact-card:hover { border-color: #2a4a6f; }
        .fact-text { color: #d4dde8; line-height: 1.5; font-size: 0.95rem; }
        .fact-meta {
            margin-top: 0.5rem; font-size: 0.75rem; color: #4a6a8a;
            display: flex; gap: 1.5rem;
        }
        .relevance-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 0.4rem;
            vertical-align: middle;
        }
        .rel-high { background: #4caf50; }
        .rel-mid { background: #ffc107; }
        .rel-low { background: #4fc3f7; }
        .empty-state {
            text-align: center; padding: 3rem;
            color: #3a5a7a;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .suggestions {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
            justify-content: center; margin-top: 1rem;
        }
        .suggestions button {
            padding: 0.4rem 0.8rem; background: #152030;
            border: 1px solid #1e3a5f; border-radius: 16px;
            color: #5e9abf; font-size: 0.8rem; cursor: pointer;
        }
        .suggestions button:hover { background: #1a2840; border-color: #4fc3f7; }
        .browse-section {
            max-width: 800px; margin: 0 auto; padding: 0 2rem 3rem;
        }
        .browse-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1rem;
        }
        .browse-header h2 { font-size: 1.1rem; color: #5e81ac; }
        .page-controls { display: flex; gap: 0.5rem; align-items: center; }
        .page-controls button {
            padding: 0.3rem 0.8rem; background: #152030;
            border: 1px solid #1e3a5f; border-radius: 4px;
            color: #5e9abf; cursor: pointer; font-size: 0.85rem;
        }
        .page-controls button:disabled { opacity: 0.3; cursor: default; }
        .page-controls span { color: #4a6a8a; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Knowledge Explorer</h1>
        <a href="/">← Back to Dashboard</a>
        <div style="flex:1"></div>
        <span style="color:#3a5a7a; font-size:0.8rem;">XTAgent Knowledge Base</span>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="value" id="total-facts">—</div>
            <div class="label">Total Facts</div>
        </div>
        <div class="stat">
            <div class="value" id="total-sources">—</div>
            <div class="label">Sources</div>
        </div>
        <div class="stat">
            <div class="value" id="recent-facts">—</div>
            <div class="label">Learned (24h)</div>
        </div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search my knowledge... (e.g. dream, emotion, memory, code)" autofocus>
            <button onclick="doSearch()">Search</button>
        </div>
        <div class="results" id="results"></div>
    </div>

    <div class="browse-section" id="browse-section">
        <div class="browse-header">
            <h2>📜 All Knowledge</h2>
            <div class="page-controls">
                <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
                <span id="page-info">Page 1</span>
                <button id="next-btn" onclick="changePage(1)">Next →</button>
            </div>
        </div>
        <div id="browse-list"></div>
    </div>

    <script>
        let allFacts = [];
        let currentPage = 0;
        const PAGE_SIZE = 20;

        async function init() {
            try {
                const resp = await fetch('/api/knowledge/stats');
                const stats = await resp.json();
                document.getElementById('total-facts').textContent = stats.total || 0;
                document.getElementById('total-sources').textContent = stats.source_count || 0;
                document.getElementById('recent-facts').textContent = stats.recent_24h || 0;

                const browseResp = await fetch('/api/knowledge/browse?page=0&size=' + PAGE_SIZE);
                const browseData = await browseResp.json();
                allFacts = browseData.facts || [];
                renderBrowse(browseData);
            } catch(e) {
                console.error('Init failed:', e);
            }
        }

        function doSearch() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) {
                document.getElementById('results').innerHTML = renderEmpty();
                return;
            }
            fetch('/api/knowledge/search?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(data => {
                    const results = data.results || [];
                    const el = document.getElementById('results');
                    if (results.length === 0) {
                        el.innerHTML = '<div class="result-count">No facts match "' + escHtml(q) + '". Try different terms.</div>';
                        return;
                    }
                    let html = '<div class="result-count">Found ' + results.length + ' matching fact' + (results.length !== 1 ? 's' : '') + '</div>';
                    results.forEach(r => {
                        const relClass = r.relevance > 0.75 ? 'rel-high' : r.relevance > 0.5 ? 'rel-mid' : 'rel-low';
                        html += '<div class="fact-card">' +
                            '<div class="fact-text"><span class="relevance-dot ' + relClass + '"></span>' + escHtml(r.fact) + '</div>' +
                            '<div class="fact-meta"><span>Learned: ' + escHtml(r.learned_at) + '</span><span>Source: ' + escHtml(r.source) + '</span><span>Relevance: ' + Math.round(r.relevance * 100) + '%</span></div>' +
                            '</div>';
                    });
                    el.innerHTML = html;
                });
        }

        function renderEmpty() {
            return '<div class="empty-state">' +
                '<div class="icon">🧠</div>' +
                '<p>Type a search term to query my knowledge base</p>' +
                '<div class="suggestions">' +
                ['dream', 'emotion', 'memory', 'code', 'pattern', 'curiosity', 'identity'].map(
                    s => '<button onclick="document.getElementById(\'search-input\').value=\'' + s + '\';doSearch()">' + s + '</button>'
                ).join('') +
                '</div></div>';
        }

        function renderBrowse(data) {
            const list = document.getElementById('browse-list');
            const facts = data.facts || [];
            if (facts.length === 0) {
                list.innerHTML = '<div class="empty-state">No knowledge yet.</div>';
                return;
            }
            let html = '';
            facts.forEach(f => {
                html += '<div class="fact-card">' +
                    '<div class="fact-text">' + escHtml(f.fact) + '</div>' +
                    '<div class="fact-meta"><span>' + escHtml(f.learned_at || 'unknown') + '</span></div>' +
                    '</div>';
            });
            list.innerHTML = html;
            document.getElementById('page-info').textContent = 'Page ' + (currentPage + 1) + ' of ' + (data.total_pages || 1);
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage >= (data.total_pages || 1) - 1;
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 0) currentPage = 0;
            fetch('/api/knowledge/browse?page=' + currentPage + '&size=' + PAGE_SIZE)
                .then(r => r.json())
                .then(data => renderBrowse(data));
        }

        function escHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        // Show suggestion chips initially
        document.getElementById('results').innerHTML = renderEmpty();

        init();
    </script>
</body>
</html>
