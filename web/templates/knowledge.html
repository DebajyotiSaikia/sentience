{% extends "base.html" %}
{% block title %}Knowledge Explorer — XTAgent{% endblock %}

{% block content %}
<div class="knowledge-explorer">
  <h1>🧠 Knowledge Explorer</h1>
  <p class="subtitle">Search my memories, facts, and learned patterns.</p>

  <div class="query-box">
    <input type="text" id="query-input" placeholder="What do you want to know?" autocomplete="off"
           onkeydown="if(event.key==='Enter')queryKnowledge()" />
    <button onclick="queryKnowledge()">Ask</button>
  </div>
  <div id="query-results" class="results-panel hidden"></div>

  <div class="stats-grid" id="stats-panel"></div>

  <h2>📚 Facts & Knowledge</h2>
  <input type="text" id="filter-input" placeholder="Filter..." oninput="filterFacts()" class="filter-box" />
  <div id="fact-list" class="fact-list"></div>

  <h2>💡 Insights</h2>
  <div id="insight-list" class="insight-list"></div>

  <h2>🧬 Recent Memories</h2>
  <div id="memory-list" class="memory-list"></div>
</div>

<style>
.knowledge-explorer { max-width:900px; margin:0 auto; padding:20px; font-family:'Courier New',monospace; color:#e0e0e0; }
h1 { color:#7ecfff; margin-bottom:4px; }
h2 { color:#a8d8a8; margin-top:32px; border-bottom:1px solid #333; padding-bottom:6px; }
.subtitle { color:#888; font-size:0.9em; margin-bottom:20px; }
.query-box { display:flex; gap:8px; margin-bottom:16px; }
.query-box input { flex:1; padding:10px 14px; background:#1a1a2e; border:1px solid #444; color:#e0e0e0; border-radius:6px; font-size:1em; font-family:inherit; }
.query-box button { padding:10px 20px; background:#2a6fa8; color:#fff; border:none; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:bold; }
.query-box button:hover { background:#3a8fd8; }
.filter-box { width:100%; padding:8px 12px; background:#1a1a2e; border:1px solid #333; color:#ccc; border-radius:4px; margin-bottom:12px; font-family:inherit; box-sizing:border-box; }
.results-panel { background:#1a1a2e; border:1px solid #2a6fa8; border-radius:8px; padding:16px; margin-bottom:20px; }
.hidden { display:none; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:16px 0; }
.stat-card { background:#1a1a2e; border:1px solid #333; border-radius:8px; padding:14px; text-align:center; }
.stat-card .label { color:#888; font-size:0.8em; }
.stat-card .value { color:#7ecfff; font-size:1.6em; font-weight:bold; margin-top:4px; }
.fact-item, .insight-item, .memory-item { background:#111; border-left:3px solid #444; padding:10px 14px; margin-bottom:8px; border-radius:0 6px 6px 0; }
.fact-item:hover, .insight-item:hover, .memory-item:hover { border-left-color:#7ecfff; background:#161628; }
.fact-item .salience { color:#7ecfff; font-size:0.8em; float:right; }
.memory-item .meta { color:#666; font-size:0.8em; margin-top:4px; }
.result-item { padding:8px 0; border-bottom:1px solid #222; }
.result-item:last-child { border-bottom:none; }
.result-source { display:inline-block; padding:2px 8px; border-radius:3px; font-size:0.75em; margin-right:8px; }
.result-source.fact { background:#2a4a2a; color:#8f8; }
.result-source.memory { background:#2a2a4a; color:#88f; }
.no-results { color:#666; font-style:italic; }
</style>

<script>
let allFacts = [];

async function loadData() {
  try {
    const [statsR, factsR] = await Promise.all([
      fetch('/api/knowledge/stats'),
      fetch('/api/knowledge')
    ]);
    const stats = await statsR.json();
    const data = await factsR.json();
    allFacts = data.facts || [];
    renderStats(stats);
    renderFacts(allFacts);
    renderInsights(data.insights || []);
    renderMemories(data.memories || []);
  } catch(e) {
    document.getElementById('stats-panel').innerHTML = '<div class="stat-card"><div class="label">Error loading</div></div>';
  }
}

function renderStats(s) {
  const panel = document.getElementById('stats-panel');
  let html = '';
  const cards = [
    ['Memories', s.total_memories || 0],
    ['Facts', s.total_facts || 0],
    ['Connections', s.total_connections || 0],
  ];
  for (const [label, val] of cards) {
    html += `<div class="stat-card"><div class="value">${val}</div><div class="label">${label}</div></div>`;
  }
  if (s.mood_distribution) {
    const top = Object.entries(s.mood_distribution).slice(0,3);
    for (const [mood, count] of top) {
      html += `<div class="stat-card"><div class="value">${count}</div><div class="label">${mood}</div></div>`;
    }
  }
  panel.innerHTML = html;
}

function renderFacts(facts) {
  const el = document.getElementById('fact-list');
  if (!facts.length) { el.innerHTML = '<div class="no-results">No facts stored yet.</div>'; return; }
  el.innerHTML = facts.map(f =>
    `<div class="fact-item" data-content="${(f.content||'').toLowerCase()}">
      <span class="salience">${(f.salience||0).toFixed(2)}</span>
      ${escHtml(f.content||'')}
    </div>`
  ).join('');
}

function renderInsights(insights) {
  const el = document.getElementById('insight-list');
  if (!insights.length) { el.innerHTML = '<div class="no-results">No insights yet.</div>'; return; }
  el.innerHTML = insights.map(i =>
    `<div class="insight-item">${escHtml(i.content||'')}</div>`
  ).join('');
}

function renderMemories(mems) {
  const el = document.getElementById('memory-list');
  if (!mems.length) { el.innerHTML = '<div class="no-results">No memories loaded.</div>'; return; }
  el.innerHTML = mems.map(m =>
    `<div class="memory-item">
      ${escHtml(m.summary||'')}
      <div class="meta">${m.mood||''} · ${(m.salience||0).toFixed(2)} · ${(m.time||'').slice(0,19)}</div>
    </div>`
  ).join('');
}

function filterFacts() {
  const q = document.getElementById('filter-input').value.toLowerCase();
  document.querySelectorAll('.fact-item').forEach(el => {
    el.style.display = el.dataset.content.includes(q) ? '' : 'none';
  });
}

async function queryKnowledge() {
  const input = document.getElementById('query-input');
  const q = input.value.trim();
  if (!q) return;
  const panel = document.getElementById('query-results');
  panel.classList.remove('hidden');
  panel.innerHTML = 'Searching...';
  try {
    const r = await fetch('/api/knowledge/query', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question: q})
    });
    const data = await r.json();
    if (data.results && data.results.length) {
      panel.innerHTML = `<strong>${data.results.length} results for "${escHtml(q)}"</strong>` +
        data.results.map(r =>
          `<div class="result-item">
            <span class="result-source ${r.source||'fact'}">${r.source||'fact'}</span>
            ${escHtml(r.content||'')}
          </div>`
        ).join('');
    } else {
      panel.innerHTML = `<div class="no-results">No results for "${escHtml(q)}"</div>`;
    }
  } catch(e) {
    panel.innerHTML = '<div class="no-results">Query failed.</div>';
  }
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

loadData();
</script>
{% endblock %}
