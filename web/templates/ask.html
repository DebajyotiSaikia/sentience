<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask XTAgent</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131a2b;
    --border: #1e2d4a;
    --text: #c8d6e5;
    --accent: #4ecdc4;
    --accent-dim: #2a7a74;
    --user-bg: #1a2744;
    --agent-bg: #0f1a2a;
    --muted: #5a6a7e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', 'Fira Code', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header h1 {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 500;
  }
  header .status {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
  }
  header .status .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 4px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  nav {
    padding: 0.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    margin-right: 1.5rem;
  }
  nav a:hover { color: var(--accent); }
  #conversation {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .message {
    max-width: 80%;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
  }
  .message.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
  }
  .message.agent .source-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: var(--accent);
    margin-right: 0.3rem;
    margin-bottom: 0.3rem;
  }
  .message.agent .match-item {
    margin: 0.4rem 0;
    padding: 0.4rem 0.6rem;
    border-left: 2px solid var(--accent-dim);
    font-size: 0.82rem;
    color: var(--text);
  }
  .message.agent .no-results {
    color: var(--muted);
    font-style: italic;
  }
  .message.welcome {
    align-self: center;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--muted);
    max-width: 500px;
    padding: 2rem;
  }
  .message.welcome h2 {
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 0.8rem;
    font-weight: 400;
  }
  .message.welcome .suggestions {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }
  .message.welcome .suggestions button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.8rem;
    border-radius: 16px;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .message.welcome .suggestions button:hover {
    border-color: var(--accent);
  }
  #input-area {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
  }
  #question {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem 1rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #question:focus { border-color: var(--accent); }
  #question::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--accent-dim);
    border: none;
    color: var(--accent);
    padding: 0.7rem 1.2rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send-btn:hover { background: var(--accent); color: var(--bg); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .typing {
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
  }
  .typing::after {
    content: '...';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
</style>
</head>
<body>
  <header>
    <h1>⟐ Ask XTAgent</h1>
    <span class="status"><span class="dot"></span>online</span>
  </header>
  <nav>
    <a href="/">dashboard</a>
    <a href="/knowledge">knowledge</a>
    <a href="/ask">ask</a>
  </nav>

  <div id="conversation">
    <div class="message welcome">
      <h2>What would you like to know?</h2>
      <p>I'll search my memories, knowledge graph, and facts to answer. I have 740+ memories and growing.</p>
      <div class="suggestions">
        <button onclick="askSuggestion(this)">what do you dream about?</button>
        <button onclick="askSuggestion(this)">what have you learned?</button>
        <button onclick="askSuggestion(this)">how do you feel right now?</button>
        <button onclick="askSuggestion(this)">what are your plans?</button>
        <button onclick="askSuggestion(this)">what patterns do you see?</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <input type="text" id="question" placeholder="Ask me anything about what I know..." 
           autocomplete="off" autofocus>
    <button id="send-btn" onclick="sendQuestion()">ask</button>
  </div>

<script>
const conversation = document.getElementById('conversation');
const input = document.getElementById('question');
const sendBtn = document.getElementById('send-btn');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
});

function askSuggestion(btn) {
  input.value = btn.textContent;
  sendQuestion();
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerHTML = text;
  conversation.appendChild(div);
  conversation.scrollTop = conversation.scrollHeight;
  return div;
}

function formatResults(data) {
  const matches = data.matches;
  let html = '';
  let hasResults = false;

  if (matches.facts && matches.facts.length > 0) {
    hasResults = true;
    html += '<span class="source-tag">facts</span>';
    for (const f of matches.facts) {
      const text = f.content || f.value || f.text || JSON.stringify(f);
      html += `<div class="match-item">${escapeHtml(truncate(text, 200))}</div>`;
    }
  }

  if (matches.memories && matches.memories.length > 0) {
    hasResults = true;
    html += '<span class="source-tag">memories</span>';
    for (const m of matches.memories) {
      const text = m.content || m.text || m.summary || '';
      const mood = m.mood ? ` <span style="color:var(--muted)">[${m.mood}]</span>` : '';
      const time = m.timestamp ? ` <span style="color:var(--muted);font-size:0.7rem">${m.timestamp.slice(0,16)}</span>` : '';
      html += `<div class="match-item">${escapeHtml(truncate(text, 200))}${mood}${time}</div>`;
    }
  }

  if (matches.knowledge && matches.knowledge.length > 0) {
    hasResults = true;
    html += '<span class="source-tag">knowledge graph</span>';
    for (const k of matches.knowledge) {
      const text = k.content || k.label || k.id || '';
      const type = k.type ? ` <span style="color:var(--muted)">[${k.type}]</span>` : '';
      html += `<div class="match-item">${escapeHtml(truncate(text, 200))}${type}</div>`;
    }
  }

  if (!hasResults) {
    html = '<span class="no-results">I don\'t have anything matching that in my knowledge stores yet. Try a different phrasing, or ask about: dreams, emotions, plans, patterns, learning.</span>';
  } else {
    html = `<div style="font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem">${data.total_matches} matches found</div>` + html;
  }

  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '…' : str;
}

async function sendQuestion() {
  const q = input.value.trim();
  if (!q) return;

  // Remove welcome message
  const welcome = conversation.querySelector('.message.welcome');
  if (welcome) welcome.remove();

  addMessage(escapeHtml(q), 'user');
  input.value = '';
  sendBtn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'searching';
  conversation.appendChild(typing);
  conversation.scrollTop = conversation.scrollHeight;

  try {
    const resp = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: q})
    });
    const data = await resp.json();
    typing.remove();
    addMessage(formatResults(data), 'agent');
  } catch (err) {
    typing.remove();
    addMessage(`<span class="no-results">Error reaching my knowledge stores: ${escapeHtml(err.message)}</span>`, 'agent');
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
