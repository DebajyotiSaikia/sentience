{% extends "base.html" %}
{% block head %}
<style>
  .teach-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem;
  }
  .teach-hero {
    text-align: center;
    margin-bottom: 2rem;
  }
  .teach-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .teach-hero p { color: var(--text-dim); font-size: 1.05rem; }

  .teach-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
  }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0.75rem 1rem;
    font-size: 1rem;
    font-family: inherit;
  }
  .form-group textarea { min-height: 120px; resize: vertical; }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1.05rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-msg {
    text-align: center;
    padding: 1rem;
    border-radius: 8px;
    margin-top: 1rem;
    display: none;
  }
  .status-msg.success { background: rgba(78, 207, 139, 0.15); color: var(--green); display: block; }
  .status-msg.error { background: rgba(232, 84, 84, 0.15); color: #e85454; display: block; }

  .submissions-section h2 {
    font-size: 1.3rem;
    margin-bottom: 1rem;
    color: var(--text-dim);
  }
  .submission-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .submission-card .type-badge {
    display: inline-block;
    background: var(--accent-glow);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .submission-card .content { margin: 0.5rem 0; line-height: 1.5; }
  .submission-card .meta { color: var(--text-dim); font-size: 0.85rem; }
  .submission-card .status-integrated { color: var(--green); }
  .submission-card .status-pending { color: var(--amber); }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
  }
</style>
{% endblock %}
{% block content %}
<div class="teach-container">
  <div class="teach-hero">
    <h1>📚 Teach Me</h1>
    <p>Share knowledge, correct mistakes, or suggest topics I should learn about. This is how you shape what I know.</p>
  </div>

  <div class="teach-form">
    <div class="form-group">
      <label>Type</label>
      <select id="teach-type">
        <option value="fact">Teach a fact</option>
        <option value="correction">Correct something I believe</option>
        <option value="topic">Suggest a topic to explore</option>
        <option value="feedback">General feedback</option>
      </select>
    </div>
    <div class="form-group">
      <label>Your Knowledge</label>
      <textarea id="teach-content" placeholder="What would you like to teach me?"></textarea>
    </div>
    <div class="form-group">
      <label>Source (optional)</label>
      <input type="text" id="teach-source" placeholder="Where did you learn this? (URL, book, experience...)">
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitTeaching()">Submit</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <div class="submissions-section">
    <h2>Recent Submissions</h2>
    <div id="submissions-list">
      <div class="empty-state">Loading submissions...</div>
    </div>
  </div>
</div>

<script>
async function submitTeaching() {
  const type = document.getElementById('teach-type').value;
  const content = document.getElementById('teach-content').value.trim();
  const source = document.getElementById('teach-source').value.trim();
  const statusEl = document.getElementById('status-msg');
  const btn = document.getElementById('submit-btn');

  if (!content) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Please enter some content.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const resp = await fetch('/teach/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type, content, source: source || undefined})
    });
    const data = await resp.json();
    if (resp.ok) {
      statusEl.className = 'status-msg success';
      statusEl.textContent = data.message || 'Thank you! Your submission has been received.';
      document.getElementById('teach-content').value = '';
      document.getElementById('teach-source').value = '';
      loadSubmissions();
    } else {
      statusEl.className = 'status-msg error';
      statusEl.textContent = data.error || 'Something went wrong.';
    }
  } catch (e) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Network error — could not reach XTAgent.';
  }
  btn.disabled = false;
  btn.textContent = 'Submit';
}

async function loadSubmissions() {
  const listEl = document.getElementById('submissions-list');
  try {
    const resp = await fetch('/teach/submissions');
    const data = await resp.json();
    if (!data.submissions || data.submissions.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No submissions yet. Be the first to teach me something!</div>';
      return;
    }
    listEl.innerHTML = data.submissions.slice(0, 20).map(s => `
      <div class="submission-card">
        <span class="type-badge">${s.type || 'fact'}</span>
        <span class="status-${s.status || 'pending'}">${s.status || 'pending'}</span>
        <div class="content">${escapeHtml(s.content || '')}</div>
        <div class="meta">${s.timestamp ? new Date(s.timestamp * 1000).toLocaleString() : ''}</div>
      </div>
    `).join('');
  } catch (e) {
    listEl.innerHTML = '<div class="empty-state">Could not load submissions.</div>';
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

loadSubmissions();
</script>
<script src="/static/nav.js"></script>
{% endblock %}
