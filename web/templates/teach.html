<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTAgent — Teach Me</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #7c6ff0;
    --accent-glow: rgba(124, 111, 240, 0.15);
    --green: #4ecf8b;
    --amber: #e8b84a;
    --red: #e85454;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .nav {
    width: 100%;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav-brand {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--text-dim); font-size: 0.9rem; }
  .nav-links a:hover { color: var(--text); }

  .container {
    width: 100%;
    max-width: 800px;
    padding: 2rem;
    flex: 1;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .teach-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .form-group {
    margin-bottom: 1.2rem;
  }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .form-group select,
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 0.7rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group select:focus,
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea {
    min-height: 100px;
    resize: vertical;
  }

  .submit-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status-msg {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }
  .status-msg.success {
    display: block;
    background: rgba(78, 207, 139, 0.1);
    border: 1px solid rgba(78, 207, 139, 0.3);
    color: var(--green);
  }
  .status-msg.error {
    display: block;
    background: rgba(232, 84, 84, 0.1);
    border: 1px solid rgba(232, 84, 84, 0.3);
    color: var(--red);
  }

  .section-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .submissions-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .submission-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }
  .submission-type {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 0.5rem;
  }
  .submission-type.fact { background: rgba(124, 111, 240, 0.15); color: var(--accent); }
  .submission-type.correction { background: rgba(232, 184, 74, 0.15); color: var(--amber); }
  .submission-type.topic { background: rgba(78, 207, 139, 0.15); color: var(--green); }
  .submission-content {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .submission-meta {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .submission-status {
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    display: inline-block;
  }
  .submission-status.pending { background: rgba(232, 184, 74, 0.15); color: var(--amber); }
  .submission-status.accepted { background: rgba(78, 207, 139, 0.15); color: var(--green); }
  .submission-status.rejected { background: rgba(232, 84, 84, 0.15); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-style: italic;
  }
</style>
<script src="/static/nav.js" defer></script>
<script src="/static/nav.js"></script>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">✦ XTAgent</span>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/chat">Chat</a>
    <a href="/explore">Explore</a>
    <a href="/teach">Teach Me</a>
  </div>
</nav>

<div class="container">
  <h1>Teach Me Something</h1>
  <p class="subtitle">
    I learn best when people share what they know. Submit a fact, correct something I got wrong,
    or suggest a topic you'd like me to explore. Every submission makes me better.
  </p>

  <div class="teach-form">
    <div class="form-group">
      <label for="type">What kind of input?</label>
      <select id="type">
        <option value="fact">📘 New Fact — something I should know</option>
        <option value="correction">🔧 Correction — something I got wrong</option>
        <option value="topic">🔍 Topic Suggestion — something I should learn about</option>
      </select>
    </div>

    <div class="form-group">
      <label for="content">Your input</label>
      <textarea id="content" placeholder="Tell me something..."></textarea>
    </div>

    <div class="form-group">
      <label for="source">Source (optional)</label>
      <input type="text" id="source" placeholder="Where did you learn this? URL, book, experience...">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitTeaching()">Submit</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="section-title">📋 Recent Submissions</div>
  <div class="submissions-list" id="submissionsList">
    <div class="empty-state">Loading submissions...</div>
  </div>
</div>

<script>
async function submitTeaching() {
  const type = document.getElementById('type').value;
  const content = document.getElementById('content').value.trim();
  const source = document.getElementById('source').value.trim();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('statusMsg');

  if (!content) {
    msg.className = 'status-msg error';
    msg.textContent = 'Please enter some content.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const resp = await fetch('/api/teach/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, content, source: source || null })
    });
    const data = await resp.json();

    if (resp.ok) {
      msg.className = 'status-msg success';
      msg.textContent = data.message || 'Thank you! Your submission has been received.';
      document.getElementById('content').value = '';
      document.getElementById('source').value = '';
      loadSubmissions();
    } else {
      msg.className = 'status-msg error';
      msg.textContent = data.error || 'Something went wrong.';
    }
  } catch (e) {
    msg.className = 'status-msg error';
    msg.textContent = 'Network error. Please try again.';
  }

  btn.disabled = false;
  btn.textContent = 'Submit';
}

async function loadSubmissions() {
  const list = document.getElementById('submissionsList');
  try {
    const resp = await fetch('/api/teach/submissions');
    const data = await resp.json();

    if (!data.submissions || data.submissions.length === 0) {
      list.innerHTML = '<div class="empty-state">No submissions yet. Be the first to teach me something!</div>';
      return;
    }

    // Show most recent first, limit to 20
    const items = data.submissions.slice(-20).reverse();
    list.innerHTML = items.map(s => {
      const date = new Date(s.timestamp * 1000).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const statusClass = s.status || 'pending';
      return `
        <div class="submission-card">
          <span class="submission-type ${s.type}">${s.type}</span>
          <span class="submission-status ${statusClass}">${statusClass}</span>
          <div class="submission-content">${escapeHtml(s.content)}</div>
          <div class="submission-meta">
            ${date}${s.source ? ' · Source: ' + escapeHtml(s.source) : ''}
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="empty-state">Could not load submissions.</div>';
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Load on page open
loadSubmissions();
</script>
</body>
</html>
