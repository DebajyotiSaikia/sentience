<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XTAgent — Knowledge Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #c0c0c0; font-family: 'Courier New', monospace; padding: 20px; }
        h1 { color: #00ff88; margin-bottom: 10px; font-size: 1.4em; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 0.85em; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 10px 15px; background: #12121a; border: 1px solid #333;
            color: #e0e0e0; font-family: inherit; font-size: 1em; border-radius: 4px;
        }
        .search-box input:focus { outline: none; border-color: #00ff88; }
        .search-box button {
            padding: 10px 20px; background: #00ff88; color: #0a0a0f; border: none;
            font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        .search-box button:hover { background: #00cc6a; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box {
            background: #12121a; border: 1px solid #222; padding: 12px 18px; border-radius: 4px;
        }
        .stat-val { color: #00ff88; font-size: 1.3em; font-weight: bold; }
        .stat-label { color: #666; font-size: 0.8em; }
        .results { margin-top: 10px; }
        .fact-card {
            background: #12121a; border: 1px solid #222; padding: 14px 18px;
            margin-bottom: 8px; border-radius: 4px; transition: border-color 0.2s;
        }
        .fact-card:hover { border-color: #00ff88; }
        .fact-text { color: #e0e0e0; line-height: 1.5; }
        .fact-meta { color: #555; font-size: 0.75em; margin-top: 6px; }
        .highlight { background: #00ff8833; color: #00ff88; padding: 1px 3px; border-radius: 2px; }
        .empty { color: #555; text-align: center; padding: 40px; font-style: italic; }
        .categories { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .cat-tag {
            padding: 4px 12px; background: #1a1a2a; border: 1px solid #333;
            border-radius: 12px; font-size: 0.8em; cursor: pointer; transition: all 0.2s;
        }
        .cat-tag:hover, .cat-tag.active { background: #00ff8822; border-color: #00ff88; color: #00ff88; }
    </style>
</head>
<body>
    <h1>🧠 Knowledge Explorer</h1>
    <p class="subtitle">Search and explore what I know — {{ total_facts }} facts across my experience</p>

    <div class="stats" id="stats"></div>

    <div class="search-box">
        <input type="text" id="query" placeholder="Search my knowledge... (e.g. 'dream', 'identity', 'code')" autofocus>
        <button onclick="search()">Search</button>
    </div>

    <div class="categories" id="categories"></div>
    <div class="results" id="results">
        <div class="empty">Type a query to explore what I know, or click a category above.</div>
    </div>

    <script>
        const queryInput = document.getElementById('query');
        queryInput.addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

        // Load stats and categories on page load
        fetch('/knowledge/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box"><div class="stat-val">${data.total_facts}</div><div class="stat-label">Total Facts</div></div>
                    <div class="stat-box"><div class="stat-val">${data.sources ? Object.keys(data.sources).length : '?'}</div><div class="stat-label">Sources</div></div>
                    <div class="stat-box"><div class="stat-val">${data.recent_count || 0}</div><div class="stat-label">Last 24h</div></div>
                `;
                if (data.sources) {
                    const cats = document.getElementById('categories');
                    for (const [src, count] of Object.entries(data.sources).sort((a,b) => b[1]-a[1]).slice(0,10)) {
                        const tag = document.createElement('span');
                        tag.className = 'cat-tag';
                        tag.textContent = `${src} (${count})`;
                        tag.onclick = () => { queryInput.value = ''; searchBySource(src); };
                        cats.appendChild(tag);
                    }
                }
            });

        function search() {
            const q = queryInput.value.trim();
            if (!q) return;
            fetch(`/knowledge/api/search?q=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(renderResults);
        }

        function searchBySource(src) {
            fetch(`/knowledge/api/search?source=${encodeURIComponent(src)}`)
                .then(r => r.json())
                .then(renderResults);
        }

        function renderResults(data) {
            const el = document.getElementById('results');
            if (!data.results || data.results.length === 0) {
                el.innerHTML = '<div class="empty">No matching knowledge found.</div>';
                return;
            }
            el.innerHTML = data.results.map(f => `
                <div class="fact-card">
                    <div class="fact-text">${escapeHtml(f.fact)}</div>
                    <div class="fact-meta">${f.source || 'unknown'} · ${f.learned_at ? f.learned_at.slice(0,10) : 'undated'}</div>
                </div>
            `).join('');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>
</body>
</html>
